<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>編み物ログ</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://fav.farm/🧶">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; background-color: #F2F2F7; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        @media (prefers-color-scheme: dark) { body { background-color: #000; } }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [projects, setProjects] = useState(() => {
                const saved = localStorage.getItem("knit-projects");
                return saved ? JSON.parse(saved) : [{ id: 1, name: "新しい作品", count: 0, history: [], rules: [], memo: "", repeat: 0, target: 0 }];
            });
            const [selectedId, setSelectedId] = useState(() => Number(localStorage.getItem("selected-project")) || 1);
            const [warning, setWarning] = useState("");
            const [activeAlert, setActiveAlert] = useState(null);
            const [settingsOpen, setSettingsOpen] = useState(false);
            const [darkMode, setDarkMode] = useState(() => {
                const saved = localStorage.getItem("dark-mode");
                return saved === null ? window.matchMedia('(prefers-color-scheme: dark)').matches : saved === "true";
            });
            
            // ルール作成用の一時状態
            const [ruleStart, setRuleStart] = useState(0);
            const [ruleEvery, setRuleEvery] = useState(10);
            const [ruleAction, setRuleAction] = useState("増し目");

            const currentProject = projects.find((p) => p.id === selectedId) || projects[0];

            useEffect(() => {
                localStorage.setItem("knit-projects", JSON.stringify(projects));
                localStorage.setItem("selected-project", selectedId);
                localStorage.setItem("dark-mode", darkMode);
            }, [projects, selectedId, darkMode]);

            function updateProject(updated) {
                setProjects((prev) => prev.map((p) => (p.id === updated.id ? updated : p)));
            }

            function addCount(amount) {
                if ("vibrate" in navigator) navigator.vibrate(15);
                const newCount = Math.max(0, currentProject.count + amount);
                let warningText = "";

                if (amount > 0) {
                    const triggered = (currentProject.rules || []).find(r => newCount >= r.start && (newCount - r.start) % r.every === 0);
                    if (triggered) {
                        setActiveAlert(triggered.action);
                        warningText = `📌 ${triggered.action}`;
                    }
                }

                setWarning(warningText);
                updateProject({
                    ...currentProject,
                    count: newCount,
                    history: [{ 
                        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), 
                        action: amount > 0 ? "+1" : "-1", 
                        count: newCount 
                    }, ...(currentProject.history || [])].slice(0, 20),
                });
            }

            const theme = {
                bg: darkMode ? "#000" : "#F2F2F7",
                card: darkMode ? "#1C1C1E" : "#FFF",
                text: darkMode ? "#FFF" : "#000",
                accent: "#007AFF",
                ruleBg: darkMode ? "rgba(0, 122, 255, 0.15)" : "#EBF5FF",
                ruleText: darkMode ? "#66B2FF" : "#007AFF",
                danger: "#FF3B30"
            };

            const styles = {
                container: { minHeight: "100vh", padding: "calc(env(safe-area-inset-top) + 10px) 20px 40px", background: theme.bg, color: theme.text, transition: "0.3s" },
                header: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "20px" },
                tab: { border: "none", borderRadius: "12px", padding: "10px 18px", fontWeight: "bold", fontSize: "14px", whiteSpace: "nowrap" },
                mainCard: { borderRadius: "35px", padding: "50px 20px", textAlign: "center", background: theme.card, boxShadow: "0 15px 35px rgba(0,0,0,0.1)", position: "relative" },
                bigNumber: { fontSize: "130px", fontWeight: "900", lineHeight: 1 },
                minusBtn: { width: "60px", height: "60px", borderRadius: "30px", border: "none", background: "#8E8E93", color: "white", fontSize: "24px", fontWeight: "bold", marginTop: "20px" },
                infoArea: { marginTop: "30px" },
                sectionLabel: { fontSize: "13px", fontWeight: "bold", opacity: 0.5, marginBottom: "10px", marginTop: "25px", display: "block" },
                memo: { width: "100%", height: "100px", borderRadius: "20px", border: "none", padding: "15px", fontSize: "16px", background: theme.card, color: theme.text, resize: "none" },
                ruleCard: { padding: "14px 18px", background: theme.ruleBg, borderRadius: "16px", marginBottom: "8px", display: "flex", justifyContent: "space-between", alignItems: "center", color: theme.ruleText, border: `1px solid ${darkMode ? "transparent" : "#D1E9FF"}` },
                modal: { position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "flex-end", zIndex: 1000 },
                modalContent: { width: "100%", borderTopLeftRadius: "30px", borderTopRightRadius: "30px", padding: "24px 24px 60px", background: theme.card },
                input: { width: "100%", padding: "14px", borderRadius: "12px", border: "none", background: darkMode ? "#2C2C2E" : "#F2F2F7", color: theme.text, fontSize: "16px", marginTop: "5px" }
            };

            return (
                <div style={styles.container}>
                    <div style={styles.header}>
                        <div style={{display:"flex", gap:8, overflowX:"auto"}}>
                            {projects.map(p => (
                                <button key={p.id} onClick={() => setSelectedId(p.id)} style={{ ...styles.tab, background: p.id === selectedId ? theme.accent : (darkMode ? "#2C2C2E" : "#E5E5EA"), color: p.id === selectedId ? "#FFF" : theme.text }}>{p.name}</button>
                            ))}
                            <button style={{...styles.tab, background:"#8E8E93", color:"#FFF"}} onClick={() => {
                                const n = prompt("作品名を入力");
                                if(n) setProjects([...projects, { id: Date.now(), name: n, count: 0, history: [], rules: [], memo: "", repeat: 0, target: 0 }]);
                            }}>＋</button>
                        </div>
                        <button style={{background:"none", border:"none", fontSize:"28px"}} onClick={() => setSettingsOpen(true)}>⚙️</button>
                    </div>

                    <div style={styles.mainCard} onClick={() => addCount(1)}>
                        <div style={{fontSize:16, fontWeight:"bold", opacity:0.4}}>{currentProject.name}</div>
                        <div style={styles.bigNumber}>{currentProject.count}</div>
                        {currentProject.repeat > 0 && <div style={{color: theme.accent, fontWeight: "bold", fontSize: "18px"}}>模様: {(currentProject.count % currentProject.repeat) || currentProject.repeat} / {currentProject.repeat}段</div>}
                        <div style={{ height: 24, color: theme.accent, fontWeight: "bold", marginTop: 10 }}>{warning}</div>
                        <div onClick={e => e.stopPropagation()}>
                            <button onClick={() => addCount(-1)} style={styles.minusBtn}>−</button>
                        </div>
                    </div>

                    <div style={styles.infoArea}>
                        <span style={styles.sectionLabel}>作品メモ</span>
                        <textarea style={styles.memo} placeholder="針の号数や毛糸の情報をメモ..." value={currentProject.memo} onChange={e => updateProject({...currentProject, memo: e.target.value})} />

                        <span style={styles.sectionLabel}>設定中のルール</span>
                        {currentProject.rules?.length === 0 ? <p style={{fontSize:14, opacity:0.3, textAlign:"center"}}>設定からルールを追加できます</p> : 
                            currentProject.rules?.map((r, i) => (
                                <div key={i} style={styles.ruleCard}>
                                    <span style={{fontSize:15}}><b>{r.start}段</b>から <b>{r.every}段</b>毎：{r.action}</span>
                                    <button onClick={() => updateProject({...currentProject, rules: currentProject.rules.filter((_, idx) => idx !== i)})} style={{background:"none", border:"none", color: theme.danger, fontSize: "22px"}}>✕</button>
                                </div>
                            ))
                        }

                        <span style={styles.sectionLabel}>履歴</span>
                        <div style={{background: theme.card, borderRadius: "20px", padding: "5px 15px", marginBottom: "20px"}}>
                            {currentProject.history?.map((h, i) => (
                                <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "12px 0", borderBottom: i === currentProject.history.length - 1 ? "none" : `1px solid ${darkMode ? "#2C2C2E" : "#EEE"}` }}>
                                    <span style={{opacity:0.5, fontSize:"13px"}}>{h.time}</span>
                                    <span style={{fontWeight:"bold", color: h.action === "+1" ? theme.accent : theme.danger}}>{h.action}</span>
                                    <span style={{fontWeight:"bold"}}>{h.count}段</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    {settingsOpen && (
                        <div style={styles.modal} onClick={() => setSettingsOpen(false)}>
                            <div style={styles.modalContent} onClick={e => e.stopPropagation()}>
                                <h3 style={{marginTop: 0}}>詳細設定</h3>
                                
                                <div style={{marginBottom: 20}}>
                                    <span style={styles.sectionLabel}>ルールの新規追加</span>
                                    <div style={{display:"flex", gap:10, marginBottom:10}}>
                                        <div style={{flex:1}}>開始段<input type="number" value={ruleStart} onChange={e => setRuleStart(Number(e.target.value))} style={styles.input} /></div>
                                        <div style={{flex:1}}>間隔<input type="number" value={ruleEvery} onChange={e => setRuleEvery(Number(e.target.value))} style={styles.input} /></div>
                                    </div>
                                    内容<input type="text" value={ruleAction} onChange={e => setRuleAction(e.target.value)} style={styles.input} />
                                    <button onClick={() => {
                                        updateProject({...currentProject, rules: [...(currentProject.rules || []), {start: ruleStart, every: ruleEvery, action: ruleAction}]});
                                    }} style={{width:"100%", padding:"12px", background:theme.accent, color:"white", border:"none", borderRadius:"12px", marginTop:10, fontWeight:"bold"}}>ルールを追加</button>
                                </div>

                                <div style={{borderTop: `1px solid ${darkMode ? "#2C2C2E" : "#EEE"}`, paddingTop: 20}}>
                                    模様リピート (0でオフ)
                                    <input type="number" value={currentProject.repeat} onChange={e => updateProject({...currentProject, repeat: Number(e.target.value)})} style={styles.input} />
                                    <div style={{display:"flex", gap:10, marginTop:15}}>
                                        <button onClick={() => setDarkMode(!darkMode)} style={{flex:1, padding:15, borderRadius:12, border:"none", background:darkMode?"#2C2C2E":"#EEE", color:theme.text}}>モード切替</button>
                                        <button onClick={() => { confirm("リセットしますか？") && updateProject({...currentProject, count: 0, history: []}) }} style={{flex:1, padding:15, borderRadius:12, border:"none", background:"#FF3B3015", color:theme.danger}}>段数リセット</button>
                                    </div>
                                    <button onClick={() => setSettingsOpen(false)} style={{width:"100%", padding:18, background:theme.text, color:theme.bg, borderRadius:15, border:"none", fontWeight:"bold", marginTop:20}}>閉じる</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {activeAlert && (
                        <div style={{position:"fixed", inset:0, background:theme.accent, display:"flex", alignItems:"center", justifyContent:"center", zIndex:2000}} onClick={() => setActiveAlert(null)}>
                            <div style={{textAlign:"center", color:"white"}}>
                                <div style={{fontSize:"64px", fontWeight:"900"}}>{activeAlert}</div>
                                <div style={{marginTop:20, padding:"10px 30px", border:"2px solid white", borderRadius:20}}>OK</div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
