<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>編み物ログ</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://fav.farm/🧶">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; background-color: #F2F2F7; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; overflow-x: hidden; }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
        @media (prefers-color-scheme: dark) { body { background-color: #000; } }
        ::-webkit-scrollbar { display: none; }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .btn-active:active { transform: scale(0.96); opacity: 0.8; }
        .rule-card:active { opacity: 0.6; background: #D1E9FF; }
        .bg-illust { position: fixed; bottom: -20px; right: -20px; font-size: 150px; opacity: 0.05; z-index: -1; pointer-events: none; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-3px); } }
        .toggle-label { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; font-size: 14px; font-weight: bold; }
        .pattern-status { background: #007AFF15; color: #007AFF; padding: 6px 12px; border-radius: 12px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        function App() {
            const [projects, setProjects] = useState(() => {
                const saved = localStorage.getItem("knit-projects-v3");
                return saved ? JSON.parse(saved) : [{ id: Date.now(), name: "作品1", count: 0, history: [], rules: [], memo: "" }];
            });
            const [selectedId, setSelectedId] = useState(() => Number(localStorage.getItem("selected-project")) || (projects[0]?.id));
            const [activeAlert, setActiveAlert] = useState(null);
            const [warning, setWarning] = useState({ message: null, type: null });
            const [ruleModalOpen, setRuleModalOpen] = useState(false);
            const [settingsOpen, setSettingsOpen] = useState(false);
            const [editingRuleIndex, setEditingRuleIndex] = useState(null);
            const [darkMode, setDarkMode] = useState(() => {
                const saved = localStorage.getItem("dark-mode");
                return saved === null ? window.matchMedia('(prefers-color-scheme: dark)').matches : saved === "true";
            });
            
            const lastClickTime = useRef(0);
            const lastDelta = useRef(null); 
            const lastAlertedCount = useRef(null);

            const currentProject = useMemo(() => projects.find(p => p.id === selectedId) || projects[0], [projects, selectedId]);

            // ルール編集用State
            const [ruleStart, setRuleStart] = useState(0);
            const [ruleEvery, setRuleEvery] = useState(0);
            const [ruleTimes, setRuleTimes] = useState(0);
            const [ruleAction, setRuleAction] = useState("");
            const [isPatternMode, setIsPatternMode] = useState(false);

            useEffect(() => {
                localStorage.setItem("knit-projects-v3", JSON.stringify(projects));
                localStorage.setItem("selected-project", selectedId);
                localStorage.setItem("dark-mode", darkMode);
            }, [projects, selectedId, darkMode]);

            const updateProject = (updated) => setProjects(prev => prev.map(p => p.id === updated.id ? updated : p));

            const theme = {
                bg: darkMode ? "#000" : "#F2F2F7",
                card: darkMode ? "#1C1C1E" : "#FFF",
                text: darkMode ? "#FFF" : "#000",
                accent: "#007AFF",
                ruleBg: darkMode ? "rgba(0, 122, 255, 0.15)" : "#EBF5FF",
                inputBg: darkMode ? "#2C2C2E" : "#F2F2F7",
                danger: "#FF3B30",
                warning: "#FF9500",
                gray: darkMode ? "#3A3A3C" : "#E5E5EA"
            };

            const handleCountChange = (delta) => {
                const now = Date.now();
                const diff = now - lastClickTime.current;
                if (delta === lastDelta.current && diff < 2000 && lastClickTime.current !== 0) {
                    setWarning({ message: "押し間違い！", type: "danger" });
                    setTimeout(() => setWarning({ message: null, type: null }), 1200);
                    return;
                } 
                lastClickTime.current = now;
                lastDelta.current = delta; 
                
                const newCount = currentProject.count + delta;
                if (newCount < 0) return;
                if ("vibrate" in navigator) navigator.vibrate(15);

                if (delta < 0) {
                    lastAlertedCount.current = null;
                } else {
                    // 通常モードのルールのみアラートを出す
                    const milestones = [];
                    currentProject.rules.filter(r => !r.isPattern).forEach(r => {
                        const times = r.times === 0 ? 100 : r.times;
                        for(let i=0; i < times; i++) milestones.push({ step: r.start + (i * r.every), action: r.action });
                    });
                    const hit = milestones.find(m => m.step === newCount);
                    if (hit && lastAlertedCount.current !== newCount) {
                        setActiveAlert(hit.action);
                        lastAlertedCount.current = newCount;
                    }
                }

                const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const newHistory = [{ time: timeStr, action: delta > 0 ? "+1" : "-1", count: newCount, isNegative: delta < 0 }, ...(currentProject.history || [])].slice(0, 10);
                updateProject({ ...currentProject, count: newCount, history: newHistory });
            };

            // 表示用：カウンター上のステータス
            const statusDisplay = useMemo(() => {
                if (warning.message) return <div style={{color: theme[warning.type], fontWeight:"bold"}}>{warning.message}</div>;

                // 編み込みモードのルールを優先表示
                const pattern = currentProject.rules.find(r => r.isPattern && currentProject.count >= r.start);
                if (pattern) {
                    const elapsed = currentProject.count - pattern.start;
                    const currentInPattern = (elapsed % pattern.every) + 1;
                    const totalTimes = Math.floor(elapsed / pattern.every) + 1;
                    return (
                        <div className="pattern-status">
                            {pattern.action}: {currentInPattern}/{pattern.every}段 ({totalTimes}回目)
                        </div>
                    );
                }

                // 次の通知ルール
                const milestones = [];
                currentProject.rules.filter(r => !r.isPattern).forEach(r => {
                    const times = r.times === 0 ? 100 : r.times;
                    for(let i=0; i < times; i++) milestones.push({ step: r.start + (i * r.every), action: r.action });
                });
                const next = milestones.sort((a,b) => a.step - b.step).find(m => m.step > currentProject.count);
                return next ? <div style={{opacity: 0.5, fontSize:13}}>次は {next.step}段 ({next.action})</div> : null;
            }, [currentProject.count, currentProject.rules, warning]);

            return (
                <div style={{ minHeight: "100vh", padding: "calc(env(safe-area-inset-top) + 15px) 20px 60px", background: theme.bg, color: theme.text }}>
                    <div className="bg-illust">🧶</div>

                    <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20}}>
                        <h2 style={{margin:0, fontSize:20}}>{currentProject.name}</h2>
                        <button onClick={() => setSettingsOpen(true)} style={{background:theme.gray, border:"none", borderRadius:10, padding:"8px 15px", color:theme.text, fontWeight:"bold"}}>設定</button>
                    </div>

                    <div style={{ background: theme.card, borderRadius: 40, padding: "30px 20px", textAlign: "center", boxShadow: "0 10px 30px rgba(0,0,0,0.1)" }}>
                        <div style={{ minHeight: 30, display: "flex", alignItems: "center", justifyContent: "center" }}>
                            {statusDisplay}
                        </div>
                        <div style={{ fontSize: 120, fontWeight: "900", lineHeight: 1, margin: "10px 0" }}>{currentProject.count}</div>
                        <div style={{ display: "flex", gap: 15 }}>
                            <button className="btn-active" onClick={() => handleCountChange(-1)} style={{ width: 80, height: 85, borderRadius: 25, border: "none", fontSize: 32, background: theme.gray, color: theme.text }}>−</button>
                            <button className="btn-active" onClick={() => handleCountChange(1)} style={{ flex: 1, height: 85, borderRadius: 25, border: "none", fontSize: 40, background: theme.accent, color: "white", fontWeight: "bold" }}>＋</button>
                        </div>
                    </div>

                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 30, marginBottom: 10 }}>
                        <span style={{ fontSize: 13, fontWeight: "bold", opacity: 0.5 }}>進行中のルール</span>
                        <button onClick={() => { 
                            setEditingRuleIndex(null); setRuleStart(currentProject.count); setRuleEvery(10); setRuleTimes(3); setRuleAction("模様A"); setIsPatternMode(true); setRuleModalOpen(true); 
                        }} style={{ background: "none", border: "none", color: theme.accent, fontWeight: "bold", fontSize: 13 }}>+ 追加</button>
                    </div>

                    {currentProject.rules.map((r, i) => (
                        <div key={i} onClick={() => { 
                            setEditingRuleIndex(i); setRuleStart(r.start); setRuleEvery(r.every); setRuleTimes(r.times); setRuleAction(r.action); setIsPatternMode(!!r.isPattern); setRuleModalOpen(true); 
                        }} style={{ padding: 16, background: r.isPattern ? theme.ruleBg : theme.gray + "55", borderRadius: 16, marginBottom: 10, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                            <div>
                                <div style={{ fontWeight: "bold", color: r.isPattern ? theme.accent : theme.text }}>{r.action} {r.isPattern && " (編み込み)"}</div>
                                <div style={{ fontSize: 12, opacity: 0.7 }}>{r.start}段〜 {r.every}段毎 / {r.times === 0 ? "無制限" : r.times + "回"}</div>
                            </div>
                            <span style={{ opacity: 0.3 }}>›</span>
                        </div>
                    ))}

                    {ruleModalOpen && (
                        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "flex-end", zIndex: 1000, backdropFilter: "blur(4px)" }} onClick={() => setRuleModalOpen(false)}>
                            <div style={{ width: "100%", borderTopLeftRadius: 30, borderTopRightRadius: 30, padding: 25, background: theme.card }} onClick={e => e.stopPropagation()}>
                                <h3 style={{marginTop:0}}>ルールの設定</h3>
                                
                                <label className="toggle-label">
                                    <input type="checkbox" checked={isPatternMode} onChange={e => setIsPatternMode(e.target.checked)} style={{width:20, height:20}} />
                                    編み込み模様モード（常時カウント表示）
                                </label>

                                <div style={{ marginBottom: 15 }}>
                                    <span style={{ fontSize: 12, opacity: 0.5 }}>模様の名前 / 内容</span>
                                    <input type="text" value={ruleAction} onChange={e => setRuleAction(e.target.value)} style={{ width: "100%", padding: 15, borderRadius: 12, border: "none", background: theme.inputBg, color: theme.text, fontSize: 16, marginTop: 5 }} />
                                </div>
                                <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>
                                    <div style={{flex:1}}>
                                        <span style={{ fontSize: 12, opacity: 0.5 }}>開始段</span>
                                        <input type="number" value={ruleStart} onChange={e => setRuleStart(Number(e.target.value))} style={{ width: "100%", padding: 15, borderRadius: 12, border: "none", background: theme.inputBg, color: theme.text, fontSize: 16, marginTop: 5 }} />
                                    </div>
                                    <div style={{flex:1}}>
                                        <span style={{ fontSize: 12, opacity: 0.5 }}>周期(段)</span>
                                        <input type="number" value={ruleEvery} onChange={e => setRuleEvery(Number(e.target.value))} style={{ width: "100%", padding: 15, borderRadius: 12, border: "none", background: theme.inputBg, color: theme.text, fontSize: 16, marginTop: 5 }} />
                                    </div>
                                    <div style={{flex:1}}>
                                        <span style={{ fontSize: 12, opacity: 0.5 }}>回数</span>
                                        <input type="number" value={ruleTimes} onChange={e => setRuleTimes(Number(e.target.value))} style={{ width: "100%", padding: 15, borderRadius: 12, border: "none", background: theme.inputBg, color: theme.text, fontSize: 16, marginTop: 5 }} />
                                    </div>
                                </div>

                                <div style={{ display: "flex", gap: 10 }}>
                                    {editingRuleIndex !== null && (
                                        <button onClick={() => { updateProject({ ...currentProject, rules: currentProject.rules.filter((_, idx) => idx !== editingRuleIndex) }); setRuleModalOpen(false); }} style={{ flex: 1, padding: 16, background: theme.danger + "22", color: theme.danger, border: "none", borderRadius: 15, fontWeight: "bold" }}>削除</button>
                                    )}
                                    <button onClick={() => {
                                        const newRule = { start: ruleStart, every: ruleEvery, times: ruleTimes, action: ruleAction, isPattern: isPatternMode };
                                        const newRules = [...currentProject.rules];
                                        if (editingRuleIndex !== null) newRules[editingRuleIndex] = newRule;
                                        else newRules.push(newRule);
                                        updateProject({ ...currentProject, rules: newRules });
                                        setRuleModalOpen(false);
                                    }} style={{ flex: 2, padding: 16, background: theme.accent, color: "white", border: "none", borderRadius: 15, fontWeight: "bold" }}>保存</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {activeAlert && (
                        <div style={{ position: "fixed", inset: 0, background: theme.accent, display: "flex", alignItems: "center", justifyContent: "center", zIndex: 2000 }} onClick={() => setActiveAlert(null)}>
                            <div style={{ textAlign: "center", color: "white" }}>
                                <div style={{ fontSize: 80, fontWeight: "900" }}>{activeAlert}</div>
                                <div style={{ marginTop: 40, padding: "15px 50px", border: "3px solid white", borderRadius: 20, fontWeight: "bold" }}>OK</div>
                            </div>
                        </div>
                    )}

                    {settingsOpen && (
                        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "flex-end", zIndex: 1000 }} onClick={() => setSettingsOpen(false)}>
                            <div style={{ width: "100%", borderTopLeftRadius: 30, padding: 25, background: theme.card }} onClick={e => e.stopPropagation()}>
                                <h3>設定</h3>
                                <button onClick={() => { setDarkMode(!darkMode); setSettingsOpen(false); }} style={{ width: "100%", padding: 16, borderRadius: 15, border: "none", background: theme.gray, color: theme.text, marginBottom: 10, fontWeight:"bold" }}>モード切替: {darkMode ? "ライト" : "ダーク"}</button>
                                <button onClick={() => setSettingsOpen(false)} style={{ width: "100%", padding: 16, borderRadius: 15, border: "none", background: theme.accent, color: "white", fontWeight:"bold" }}>閉じる</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
