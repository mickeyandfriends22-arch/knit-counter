<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>編み物ログ</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://fav.farm/🧶">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; background-color: #F2F2F7; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
        @media (prefers-color-scheme: dark) { body { background-color: #000; } }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        function App() {
            const [projects, setProjects] = useState(() => {
                const saved = localStorage.getItem("knit-projects");
                return saved ? JSON.parse(saved) : [{ id: 1, name: "作品1", count: 0, history: [], rules: [], memo: "" }];
            });
            const [selectedId, setSelectedId] = useState(() => Number(localStorage.getItem("selected-project")) || 1);
            const [activeAlert, setActiveAlert] = useState(null);
            const [warning, setWarning] = useState("");
            const [settingsOpen, setSettingsOpen] = useState(false);
            const [scheduleOpen, setScheduleOpen] = useState(false);
            const [darkMode, setDarkMode] = useState(() => {
                const saved = localStorage.getItem("dark-mode");
                return saved === null ? window.matchMedia('(prefers-color-scheme: dark)').matches : saved === "true";
            });
            
            const lastClickTime = useRef(0);
            const [ruleStart, setRuleStart] = useState(0);
            const [ruleEvery, setRuleEvery] = useState(10);
            const [ruleTimes, setRuleTimes] = useState(0);
            const [ruleAction, setRuleAction] = useState("増し目");

            const currentProject = useMemo(() => projects.find(p => p.id === selectedId) || projects[0], [projects, selectedId]);

            useEffect(() => {
                localStorage.setItem("knit-projects", JSON.stringify(projects));
                localStorage.setItem("selected-project", selectedId);
                localStorage.setItem("dark-mode", darkMode);
            }, [projects, selectedId, darkMode]);

            // 有効な（まだ終わっていない）ルールのみでスケジュールを計算
            const allMilestones = useMemo(() => {
                let points = [];
                (currentProject.rules || []).forEach(r => {
                    const times = r.times === 0 ? 100 : r.times;
                    for(let i=0; i < times; i++) {
                        const step = r.start + (i * r.every);
                        // 現在の段数より後の地点だけをリストアップ
                        points.push({ step, action: r.action, originalRule: r });
                    }
                });
                return points.sort((a, b) => a.step - b.step);
            }, [currentProject.rules]);

            // すべての回数を終えたルールを自動削除する
            useEffect(() => {
                const activeRules = (currentProject.rules || []).filter(r => {
                    if (r.times === 0) return true; // 無限ルールは消さない
                    const lastStep = r.start + ((r.times - 1) * r.every);
                    return currentProject.count < lastStep;
                });

                if (activeRules.length !== (currentProject.rules || []).length) {
                    updateProject({ ...currentProject, rules: activeRules });
                }
            }, [currentProject.count]);

            function updateProject(updated) {
                setProjects(prev => prev.map(p => p.id === updated.id ? updated : p));
            }

            function addCount(amount) {
                const now = Date.now();
                if ("vibrate" in navigator) navigator.vibrate(15);

                // 警告ロジック
                if (amount > 0) {
                    const diff = (now - lastClickTime.current) / 1000;
                    if (diff < 2) {
                        setWarning("押し間違い！");
                    } else if (diff < 10) {
                        setWarning("押し間違い？");
                    } else {
                        setWarning("");
                    }
                    lastClickTime.current = now;
                }

                const newCount = Math.max(0, currentProject.count + amount);
                
                if (amount > 0) {
                    const hit = allMilestones.find(m => m.step === newCount);
                    if (hit) setActiveAlert(hit.action);
                }

                updateProject({
                    ...currentProject,
                    count: newCount,
                    history: [{ 
                        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), 
                        action: amount > 0 ? "+1" : "-1", 
                        count: newCount 
                    }, ...(currentProject.history || [])].slice(0, 10)
                });
            }

            const nextMilestone = allMilestones.find(m => m.step > currentProject.count);

            const theme = {
                bg: darkMode ? "#000" : "#F2F2F7",
                card: darkMode ? "#1C1C1E" : "#FFF",
                text: darkMode ? "#FFF" : "#000",
                accent: "#007AFF",
                ruleBg: darkMode ? "rgba(0, 122, 255, 0.15)" : "#EBF5FF",
                danger: "#FF3B30"
            };

            const styles = {
                container: { minHeight: "100vh", padding: "calc(env(safe-area-inset-top) + 15px) 20px 60px", background: theme.bg, color: theme.text, transition: "0.3s" },
                mainCard: { borderRadius: "35px", padding: "45px 20px", textAlign: "center", background: theme.card, boxShadow: "0 10px 30px rgba(0,0,0,0.1)", position: "relative" },
                bigNumber: { fontSize: "120px", fontWeight: "900", lineHeight: 1 },
                sectionLabel: { fontSize: "13px", fontWeight: "bold", opacity: 0.5, margin: "25px 0 10px", display: "block" },
                ruleCard: { padding: "14px 18px", background: theme.ruleBg, borderRadius: "16px", marginBottom: "8px", display: "flex", justifyContent: "space-between", alignItems: "center", color: theme.accent },
                modal: { position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "flex-end", zIndex: 1000 },
                modalContent: { width: "100%", borderTopLeftRadius: "30px", borderTopRightRadius: "30px", padding: "25px", background: theme.card, maxHeight: "80vh", overflowY: "auto" }
            };

            return (
                <div style={styles.container}>
                    <div style={{display:"flex", justifyContent:"space-between", marginBottom:20}}>
                        <div style={{display:"flex", gap:8, overflowX:"auto"}}>
                            {projects.map(p => (
                                <button key={p.id} onClick={() => setSelectedId(p.id)} style={{ border:"none", borderRadius:12, padding:"10px 18px", fontWeight:"bold", background: p.id === selectedId ? theme.accent : (darkMode ? "#2C2C2E" : "#E5E5EA"), color: p.id === selectedId ? "#FFF" : theme.text }}>{p.name}</button>
                            ))}
                        </div>
                        <button style={{background:"none", border:"none", fontSize:"28px"}} onClick={() => setSettingsOpen(true)}>⚙️</button>
                    </div>

                    <div style={styles.mainCard} onClick={() => addCount(1)}>
                        <div style={{opacity:0.4, fontWeight:"bold"}}>{currentProject.name}</div>
                        <div style={styles.bigNumber}>{currentProject.count}</div>
                        <div style={{height:35, display:"flex", flexDirection:"column", alignItems:"center"}}>
                            {nextMilestone && (
                                <button onClick={(e) => { e.stopPropagation(); setScheduleOpen(true); }} style={{background:theme.ruleBg, border:"none", borderRadius:15, padding:"5px 15px", color:theme.accent, fontWeight:"bold", fontSize:14}}>
                                    次は {nextMilestone.step}段目 ({nextMilestone.action}) ▾
                                </button>
                            )}
                            <div style={{color: theme.danger, fontWeight: "bold", fontSize: 14, marginTop: 5, height: 20}}>{warning}</div>
                        </div>
                        <div onClick={e => e.stopPropagation()}><button onClick={() => addCount(-1)} style={{width:60, height:60, borderRadius:30, border:"none", background:"#8E8E93", color:"white", fontSize:24, marginTop:15}}>−</button></div>
                    </div>

                    <span style={styles.sectionLabel}>進行中のルール</span>
                    {currentProject.rules?.length === 0 ? <p style={{opacity:0.3, fontSize:14, textAlign:"center"}}>予定されているルールはありません</p> : 
                        currentProject.rules?.map((r, i) => (
                            <div key={i} style={styles.ruleCard}>
                                <span style={{fontSize:15}}><b>{r.start}段</b>〜 <b>{r.every}段</b>毎 ({r.times === 0 ? "ずっと" : r.times + "回"})</span>
                                <button onClick={() => updateProject({...currentProject, rules: currentProject.rules.filter((_, idx) => idx !== i)})} style={{background:"none", border:"none", color: theme.danger, fontSize: "22px"}}>✕</button>
                            </div>
                        ))
                    }

                    <span style={styles.sectionLabel}>作品メモ</span>
                    <textarea style={{width:"100%", height:80, borderRadius:20, border:"none", padding:15, background:theme.card, color:theme.text, fontSize:16}} placeholder="針の号数や毛糸の情報など..." value={currentProject.memo} onChange={e => updateProject({...currentProject, memo: e.target.value})} />

                    <span style={styles.sectionLabel}>履歴</span>
                    <div style={{background: theme.card, borderRadius: "20px", padding: "5px 15px", marginBottom: 20}}>
                        {currentProject.history?.map((h, i) => (
                            <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "12px 0", borderBottom: i === currentProject.history.length - 1 ? "none" : `1px solid ${darkMode ? "#2C2C2E" : "#EEE"}` }}>
                                <span style={{opacity:0.5, fontSize:13}}>{h.time}</span>
                                <span style={{fontWeight:"bold", color: h.action === "+1" ? theme.accent : theme.danger}}>{h.action}</span>
                                <span style={{fontWeight:"bold"}}>{h.count}段</span>
                            </div>
                        ))}
                    </div>

                    {/* ポップアップスケジュール */}
                    {scheduleOpen && (
                        <div style={styles.modal} onClick={() => setScheduleOpen(false)}>
                            <div style={styles.modalContent} onClick={e => e.stopPropagation()}>
                                <h3 style={{marginTop:0, textAlign:"center"}}>今後のスケジュール</h3>
                                {allMilestones.filter(m => m.step > currentProject.count).slice(0, 20).map((m, i) => (
                                    <div key={i} style={{
                                        display:"flex", justifyContent:"space-between", padding:"15px", borderRadius:15, marginBottom:8,
                                        background: i === 0 ? theme.accent : (darkMode ? "#2C2C2E" : "#F2F2F7"),
                                        color: i === 0 ? "#FFF" : theme.text
                                    }}>
                                        <span style={{fontWeight: i === 0 ? "900" : "normal", fontSize: i === 0 ? 18 : 16}}>{m.step}段目</span>
                                        <span style={{fontWeight: i === 0 ? "900" : "normal"}}>{m.action}</span>
                                    </div>
                                ))}
                                <button onClick={() => setScheduleOpen(false)} style={{width:"100%", padding:18, background:theme.text, color:theme.bg, borderRadius:15, border:"none", fontWeight:"bold", marginTop:15}}>閉じる</button>
                            </div>
                        </div>
                    )}

                    {settingsOpen && (
                        <div style={styles.modal} onClick={() => setSettingsOpen(false)}>
                            <div style={styles.modalContent} onClick={e => e.stopPropagation()}>
                                <h3 style={{marginTop:0}}>詳細設定</h3>
                                <div style={{marginBottom:15}}>
                                    <span style={{fontSize:12, opacity:0.6}}>ルールの新規追加</span>
                                    <div style={{display:"flex", gap:10, marginTop:5}}>
                                        <div style={{flex:1}}>開始<input type="number" value={ruleStart} onChange={e => setRuleStart(Number(e.target.value))} style={{width:"100%", padding:12, borderRadius:12, border:"none", background:darkMode?"#2C2C2E":"#F2F2F7", color:theme.text}} /></div>
                                        <div style={{flex:1}}>間隔<input type="number" value={ruleEvery} onChange={e => setRuleEvery(Number(e.target.value))} style={{width:"100%", padding:12, borderRadius:12, border:"none", background:darkMode?"#2C2C2E":"#F2F2F7", color:theme.text}} /></div>
                                        <div style={{flex:1}}>回数<input type="number" value={ruleTimes} onChange={e => setRuleTimes(Number(e.target.value))} placeholder="0は無限" style={{width:"100%", padding:12, borderRadius:12, border:"none", background:darkMode?"#2C2C2E":"#F2F2F7", color:theme.text}} /></div>
                                    </div>
                                    内容<input type="text" value={ruleAction} onChange={e => setRuleAction(e.target.value)} style={{width:"100%", padding:12, borderRadius:12, border:"none", background:darkMode?"#2C2C2E":"#F2F2F7", color:theme.text, marginTop:5}} />
                                    <button onClick={() => {
                                        updateProject({...currentProject, rules: [...(currentProject.rules || []), {start: ruleStart, every: ruleEvery, times: ruleTimes, action: ruleAction}]});
                                    }} style={{width:"100%", padding:15, background:theme.accent, color:"white", border:"none", borderRadius:15, fontWeight:"bold", marginTop:10}}>ルールを追加</button>
                                </div>
                                <div style={{display:"flex", gap:10, marginTop:20}}>
                                    <button onClick={() => setDarkMode(!darkMode)} style={{flex:1, padding:12, borderRadius:12, border:"none", background:darkMode?"#2C2C2E":"#EEE", color:theme.text}}>モード切替</button>
                                    <button onClick={() => { if(confirm("今の段数を0に戻しますか？")){ updateProject({...currentProject, count:0, history:[]}); setSettingsOpen(false); } }} style={{flex:1, padding:12, borderRadius:12, border:"none", background:"#FF3B3015", color:theme.danger}}>段数リセット</button>
                                </div>
                                <button onClick={() => setSettingsOpen(false)} style={{width:"100%", padding:18, background:theme.text, color:theme.bg, borderRadius:15, border:"none", fontWeight:"bold", marginTop:15}}>閉じる</button>
                            </div>
                        </div>
                    )}

                    {activeAlert && (
                        <div style={{position:"fixed", inset:0, background:theme.accent, display:"flex", alignItems:"center", justifyContent:"center", zIndex:2000}} onClick={() => setActiveAlert(null)}>
                            <div style={{textAlign:"center", color:"white"}}>
                                <div style={{fontSize:80, fontWeight:"900"}}>{activeAlert}</div>
                                <div style={{marginTop:30, padding:"12px 40px", border:"2px solid white", borderRadius:20, fontWeight:"bold"}}>OK</div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
