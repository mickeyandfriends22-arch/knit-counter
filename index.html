<!DOCTYPE html><html lang="ja"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>編み物ログ Pro Stable</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://fav.farm/🧶">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; background-color: #F2F2F7; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; overflow-x: hidden; }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
        @media (prefers-color-scheme: dark) { body { background-color: #000; } }
        ::-webkit-scrollbar { display: none; }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .btn-active:active { transform: scale(0.96); opacity: 0.8; }
        .rule-card { transition: background 0.2s; }
        .rule-card:active { opacity: 0.6; }
        .history-item { display: flex; justify-content: space-between; padding: 12px 0; align-items: center; }
        .bg-illust { position: fixed; bottom: -20px; right: -20px; font-size: 150px; opacity: 0.05; z-index: -1; pointer-events: none; }
        
        .pattern-status { background: #007AFF15; color: #007AFF; padding: 6px 12px; border-radius: 12px; font-size: 13px; font-weight: bold; border: 1px solid #007AFF33; }
        @media (prefers-color-scheme: dark) { .pattern-status { background: #007AFF33; } }
        
        .next-status { background: #007AFF; color: #FFFFFF; padding: 6px 12px; border-radius: 12px; font-size: 13px; font-weight: bold; border: none; cursor: pointer; box-shadow: 0 2px 8px rgba(0,122,255,0.3); }
        .next-status:active { transform: scale(0.96); opacity: 0.9; }

        .progress-container { width: 100%; background: #E5E5EA; height: 24px; border-radius: 12px; position: relative; overflow: hidden; margin: 15px 0; }
        @media (prefers-color-scheme: dark) { .progress-container { background: #2C2C2E; } }
        .progress-bar { height: 100%; background: #007AFF; transition: width 0.3s ease; border-radius: 12px; }
        .progress-label { position: absolute; width: 100%; top: 0; left: 0; height: 100%; display: flex; justify-content: center; align-items: center; font-size: 11px; font-weight: bold; color: #FFF; text-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        
        .size-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .size-table th, .size-table td { padding: 10px; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.05); }
        @media (prefers-color-scheme: dark) { .size-table th, .size-table td { border-bottom: 1px solid rgba(255,255,255,0.05); } }
        .size-table th { font-size: 12px; opacity: 0.5; }
        .size-table td { font-size: 15px; }

        .pattern-instruction-box { background: #FF950015; border: 1px solid #FF950044; border-radius: 20px; padding: 15px; margin-bottom: 15px; text-align: left; animation: fadeIn 0.3s ease; }
        @media (prefers-color-scheme: dark) { .pattern-instruction-box { background: #FF950025; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .part-badge { background: #34C75922; color: #34C759; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: bold; margin-bottom: 5px; display: inline-block; }
        .part-nav-btn { background: none; border: none; color: #007AFF; font-size: 12px; font-weight: bold; cursor: pointer; padding: 5px; }

        .auto-grow-textarea {
            width: 100%;
            min-height: 140px;
            max-height: 40vh;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 15px;
            line-height: 1.5;
            resize: none;
            overflow-y: auto;
            -webkit-user-select: text;
            user-select: text;
        }

        .menu-grid-btn {
            background: #F2F2F7;
            border: none;
            border-radius: 14px;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        @media (prefers-color-scheme: dark) { .menu-grid-btn { background: #2C2C2E; } }
        .menu-grid-btn:active { transform: scale(0.95); opacity: 0.8; }

        /* 追加されたチャート周りのスタイル */
        .chart-popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 2000; padding: 20px; box-sizing: border-box; }
        .chart-popup-content { width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; border-radius: 30px; padding: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.3); animation: fadeIn 0.2s ease; }
        .chart-editor-grid { display: grid; gap: 2px; background: #8E8E93; padding: 2px; border-radius: 6px; margin: 20px auto; width: fit-content; }
        .chart-editor-cell { width: 36px; height: 36px; cursor: pointer; border: 1px solid rgba(0,0,0,0.05); box-sizing: border-box; transition: transform 0.1s; }
        .chart-editor-cell:active { transform: scale(0.9); }
        .chart-cell-highlight { outline: 3px solid #FF9500; outline-offset: -3px; z-index: 5; }
        .palette-selector { display: flex; justify-content: center; gap: 15px; margin: 15px 0; }
        .palette-btn { width: 34px; height: 34px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; position: relative; }
        .palette-btn.selected::after { content: "✓"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #FFF; font-weight: bold; text-shadow: 0 1px 2px rgba(0,0,0,0.6); font-size: 14px; }
        .mini-chart-row-preview { display: flex; gap: 3px; justify-content: center; margin: 8px 0; }
        .mini-preview-cell { width: 18px; height: 18px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.1); }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        function App() {
            const STORAGE_KEYS = ["knit-projects-v6-multi-pattern"];
            
            const [projects, setProjects] = useState(() => {
                for (let key of STORAGE_KEYS) {
                    const saved = localStorage.getItem(key);
                    if (saved) return JSON.parse(saved).map(p => ({
                        ...p, 
                        targetCount: p.targetCount || 0,
                        rawPatternText: p.rawPatternText || "",
                        currentPartIndex: p.currentPartIndex || 0,
                        memo: p.memo || "",
                        // チャート用データの初期構造を確保
                        chartConfig: p.chartConfig || { rows: 4, cols: 5, grid: {}, colorMap: { 'W': '#FFFFFF', 'B': '#333333', 'U': '#007AFF' } }
                    }));
                }
                return [{ id: Date.now(), name: "作品1", count: 0, targetCount: 0, history: [], rules: [], rawPatternText: "", currentPartIndex: 0, memo: "", chartConfig: { rows: 4, cols: 5, grid: {}, colorMap: { 'W': '#FFFFFF', 'B': '#333333', 'U': '#007AFF' } } }];
            });

            const [selectedId, setSelectedId] = useState(() => Number(localStorage.getItem("selected-project")) || (projects[0]?.id));
            const [activeAlert, setActiveAlert] = useState(null);
            const [warning, setWarning] = useState({ message: null, type: null });
            const [ruleModalOpen, setRuleModalOpen] = useState(false);
            const [mainMenuOpen, setMainMenuOpen] = useState(false); 
            const [scheduleOpen, setScheduleOpen] = useState(false);
            const [sizeTableOpen, setSizeTableOpen] = useState(false);
            const [patternModalOpen, setPatternModalOpen] = useState(false);
            const [memoModalOpen, setMemoModalOpen] = useState(false); 
            const [spellModalOpen, setSpellModalOpen] = useState(false); 
            const [chartModalOpen, setChartModalOpen] = useState(false); // チャートポップアップ用
            const [sizeTab, setSizeTab] = useState("crochet"); 
            const [editingRuleIndex, setEditingRuleIndex] = useState(null);
            const [historyExpanded, setHistoryExpanded] = useState(false);
            const [darkMode, setDarkMode] = useState(() => {
                const saved = localStorage.getItem("dark-mode");
                return saved === null ? window.matchMedia('(prefers-color-scheme: dark)').matches : saved === "true";
            });
            
            const lastClickTime = useRef(0);
            const lastDelta = useRef(null); 
            const lastAlertedCount = useRef(null);
            const popupTimeoutRef = useRef(null);
            const textareaRef = useRef(null);

            const currentProject = useMemo(() => projects.find(p => p.id === selectedId) || projects[0], [projects, selectedId]);
            
            const [patternInput, setPatternInput] = useState(currentProject.rawPatternText || "");
            const [memoInput, setMemoInput] = useState(currentProject.memo || ""); 
            const [spellInput, setSpellInput] = useState(""); 

            // チャートエディタ用の一時ステート
            const currentChartConfig = currentProject.chartConfig || { rows: 4, cols: 5, grid: {}, colorMap: { 'W': '#FFFFFF', 'B': '#333333', 'U': '#007AFF' } };
            const [chartRowsInput, setChartRowsInput] = useState(currentChartConfig.rows);
            const [chartColsInput, setChartColsInput] = useState(currentChartConfig.cols);
            const [selectedPenColor, setSelectedPenColor] = useState('W'); // 'W'=白, 'B'=黒, 'U'=青

            const adjustTextareaHeight = () => {
                const textarea = textareaRef.current;
                if (textarea) {
                    textarea.style.height = "auto";
                    textarea.style.height = `${textarea.scrollHeight}px`;
                }
            };

            useEffect(() => {
                setPatternInput(currentProject.rawPatternText || "");
                setMemoInput(currentProject.memo || "");
                setHistoryExpanded(false);
                if (popupTimeoutRef.current) clearTimeout(popupTimeoutRef.current);
                
                // プロジェクト切り替え時にチャートサイズ入力を同期
                const cConfig = currentProject.chartConfig || { rows: 4, cols: 5, grid: {}, colorMap: { 'W': '#FFFFFF', 'B': '#333333', 'U': '#007AFF' } };
                setChartRowsInput(cConfig.rows);
                setChartColsInput(cConfig.cols);
            }, [selectedId, currentProject.rawPatternText, currentProject.memo, currentProject.chartConfig]);

            useEffect(() => {
                if (memoModalOpen) {
                    setTimeout(adjustTextareaHeight, 50);
                }
            }, [memoModalOpen, memoInput]);

            const [ruleStart, setRuleStart] = useState(0);
            const [ruleEvery, setRuleEvery] = useState(0);
            const [ruleTimes, setRuleTimes] = useState(0);
            const [ruleAction, setRuleAction] = useState("模様編み");
            const [isPatternMode, setIsPatternMode] = useState(false);

            useEffect(() => {
                const data = JSON.stringify(projects);
                STORAGE_KEYS.forEach(key => localStorage.setItem(key, data));
                localStorage.setItem("selected-project", selectedId);
                localStorage.setItem("dark-mode", darkMode);
            }, [projects, selectedId, darkMode]);

            const allMilestones = useMemo(() => {
                let points = [];
                (currentProject.rules || []).forEach(r => {
                    const times = r.times === 0 ? 500 : r.times;
                    for(let i=0; i < times; i++) {
                        points.push({ step: r.start + (i * r.every), action: r.action, isPattern: r.isPattern });
                    }
                });
                return points.sort((a, b) => a.step - b.step);
            }, [currentProject.rules]);

            // チャートから生成されるテキスト指示と、入力されたテキスト指示を綺麗にマージする処理
            const parsedParts = useMemo(() => {
                const rawText = currentProject.rawPatternText || "";
                const partBlocks = rawText.split(/\n\s*---\s*\n|\n\s*終わり\s*\n/i);
                
                const cConfig = currentProject.chartConfig || { rows: 4, cols: 5, grid: {}, colorMap: { 'W': '#FFFFFF', 'B': '#333333', 'U': '#007AFF' } };
                const cGrid = cConfig.grid || {};

                return partBlocks.map((block, pIdx) => {
                    const lines = block.split("\n");
                    const explicitMap = {};
                    let repeatStart = null;
                    let repeatEnd = null;
                    let maxRow = 0;
                    let partName = `パーツ ${pIdx + 1}`;

                    lines.forEach(line => {
                        const trimmed = line.trim();
                        if (!trimmed) return;

                        if (trimmed.startsWith("◆")) {
                            partName = trimmed;
                            return;
                        }

                        const repeatMatch = trimmed.match(/(\d+)\s*[-〜~]\s*(\d+)\s*段目?(?:の)?(?:繰り返し|リピート|Repeat)/i);
                        if (repeatMatch) {
                            repeatStart = parseInt(repeatMatch[1], 10);
                            repeatEnd = parseInt(repeatMatch[2], 10);
                            if(repeatEnd > maxRow) maxRow = repeatEnd;
                            return;
                        }

                        const rangeMatch = trimmed.match(/^(?:Row\s*)?(\d+)\s*[-〜~]\s*(\d+)\s*段目?\s*[:：]\s*(.*)$/i);
                        const singleMatch = trimmed.match(/^(?:Row\s*)?(\d+)\s*段目?\s*[:：]\s*(.*)$/i);

                        if (rangeMatch) {
                            const start = parseInt(rangeMatch[1], 10);
                            const end = parseInt(rangeMatch[2], 10);
                            const desc = rangeMatch[3].trim();
                            for (let i = start; i <= end; i++) {
                                explicitMap[i] = desc;
                            }
                            if(end > maxRow) maxRow = end;
                        } else if (singleMatch) {
                            const step = parseInt(singleMatch[1], 10);
                            const desc = singleMatch[2].trim();
                            explicitMap[step] = desc;
                            if(step > maxRow) maxRow = step;
                        }
                    });

                    // 【最重要】最初のパーツ(パーツ1)に、ポップアップエディタで作ったマスの情報を上書き連動させる
                    if (pIdx === 0) {
                        for (let r = 1; r <= cConfig.rows; r++) {
                            let rowColors = [];
                            for (let c = 1; c <= cConfig.cols; c++) {
                                const colorKey = cGrid[`${r}-${c}`] || 'W';
                                const label = colorKey === 'W' ? '白' : colorKey === 'B' ? '黒' : '青';
                                rowColors.push(label);
                            }
                            // 「白1, 青1, 白3」のように見やすくまとめる簡易圧縮処理
                            let compiledDesc = [];
                            let currentType = rowColors[0];
                            let currentCount = 1;
                            for (let i = 1; i < rowColors.length; i++) {
                                if (rowColors[i] === currentType) {
                                    currentCount++;
                                } else {
                                    compiledDesc.push(`${currentType}${currentCount}`);
                                    currentType = rowColors[i];
                                    currentCount = 1;
                                }
                            }
                            compiledDesc.push(`${currentType}${currentCount}`);
                            
                            const chartInstruction = `[チャート] ${compiledDesc.join(', ')}`;
                            // 既存の入力がすでにあれば、その後ろにくっつける
                            if (explicitMap[r]) {
                                explicitMap[r] = `${chartInstruction} / ${explicitMap[r]}`;
                            } else {
                                explicitMap[r] = chartInstruction;
                            }
                            if (r > maxRow) maxRow = r;
                        }
                    }

                    return { partName, explicitMap, repeatStart, repeatEnd, maxRow };
                });
            }, [currentProject.rawPatternText, currentProject.chartConfig]);

            const activePartIndex = Math.min(currentProject.currentPartIndex || 0, Math.max(0, parsedParts.length - 1));
            const activePart = parsedParts[activePartIndex];

            const effectiveTargetCount = useMemo(() => {
                if (activePart && activePart.maxRow > 0) {
                    return activePart.maxRow;
                }
                return currentProject.targetCount || 0;
            }, [activePart, currentProject.targetCount]);

            const currentInstruction = useMemo(() => {
                if (!activePart) return null;
                const { explicitMap, repeatStart, repeatEnd } = activePart;
                const targetRow = currentProject.count + 1; // 次に編む段（または現在の段）

                if (explicitMap[targetRow]) return { row: targetRow, text: explicitMap[targetRow] };

                if (repeatStart && repeatEnd && repeatEnd >= repeatStart && targetRow > repeatEnd) {
                    const cycle = repeatEnd - repeatStart + 1;
                    const relativeOffset = (targetRow - repeatStart) % cycle;
                    const equivalentRow = repeatStart + relativeOffset;
                    if (explicitMap[equivalentRow]) {
                        return { row: targetRow, text: `[${equivalentRow}段目のリピート]: ${explicitMap[equivalentRow]}` };
                    }
                }
                return null;
            }, [activePart, currentProject.count]);

            const progressInfo = useMemo(() => {
                if (!effectiveTargetCount || effectiveTargetCount === 0) return null;
                const percent = Math.floor((currentProject.count / effectiveTargetCount) * 100);
                return { 
                    percent: Math.min(100, percent), 
                    rawPercent: percent,
                    text: `${percent}% (${currentProject.count}/${effectiveTargetCount})` 
                };
            }, [currentProject.count, effectiveTargetCount]);

            const fireConfetti = () => {
                const count = 150;
                const defaults = { origin: { y: 0.7 }, colors: ['#007AFF', '#34C759', '#FFD60A'] };
                function fire(particleRatio, opts) {
                    confetti({ ...defaults, ...opts, particleCount: Math.floor(count * particleRatio) });
                }
                fire(0.25, { spread: 26, startVelocity: 55, origin: { x: 0, y: 0.7 }, angle: 60 });
                fire(0.25, { spread: 26, startVelocity: 55, origin: { x: 1, y: 0.7 }, angle: 120 });
                fire(0.5, { spread: 60, origin: { x: 0.5, y: 0.8 } });
            };

            function updateProject(updated) {
                setProjects(prev => prev.map(p => p.id === updated.id ? updated : p));
            }

            // チャートセルのタップ処理
            const handleCellClick = (r, c) => {
                const cConfig = currentProject.chartConfig || { rows: 4, cols: 5, grid: {}, colorMap: { 'W': '#FFFFFF', 'B': '#333333', 'U': '#007AFF' } };
                const newGrid = { ...(cConfig.grid || {}) };
                newGrid[`${r}-${c}`] = selectedPenColor;
                
                updateProject({
                    ...currentProject,
                    chartConfig: { ...cConfig, grid: newGrid }
                });
            };

            // チャートサイズの再構築
            const rebuildChartGrid = () => {
                const cConfig = currentProject.chartConfig || { rows: 4, cols: 5, grid: {}, colorMap: { 'W': '#FFFFFF', 'B': '#333333', 'U': '#007AFF' } };
                updateProject({
                    ...currentProject,
                    chartConfig: {
                        ...cConfig,
                        rows: chartRowsInput,
                        cols: chartColsInput
                    }
                });
            };

            const generateSingleSpell = () => {
                try {
                    const jsonString = JSON.stringify(currentProject);
                    return btoa(unescape(encodeURIComponent(jsonString)));
                } catch (e) {
                    return "呪文の作成に失敗しました";
                }
            };

            const applySingleSpell = (spell) => {
                if (!spell.trim()) return;
                try {
                    const decodedJson = decodeURIComponent(escape(atob(spell.trim())));
                    const parsedProject = JSON.parse(decodedJson);
                    if (parsedProject && parsedProject.name && typeof parsedProject.count === 'number') {
                        const newProject = { 
                            ...parsedProject, 
                            id: Date.now(), 
                            name: parsedProject.name + " (復元)",
                            chartConfig: parsedProject.chartConfig || { rows: 4, cols: 5, grid: {}, colorMap: { 'W': '#FFFFFF', 'B': '#333333', 'U': '#007AFF' } }
                        };
                        setProjects(prev => [...prev, newProject]);
                        setSelectedId(newProject.id);
                        alert(`🔮 復活の呪文に成功しました！\n「${newProject.name}」が追加されました。`);
                        setSpellInput("");
                        setSpellModalOpen(false);
                        setMainMenuOpen(false);
                    } else { alert("❌ 呪文が正しくありません。"); }
                } catch (e) { alert("❌ 呪文の詠唱に失敗しました。"); }
            };

            const theme = {
                bg: darkMode ? "#000" : "#F2F2F7",
                card: darkMode ? "#1C1C1E" : "#FFF",
                text: darkMode ? "#FFF" : "#000",
                accent: "#007AFF",
                ruleNormalBg: darkMode ? "#2C2C2E" : "#E5E5EA",
                rulePatternBg: darkMode ? "rgba(0, 122, 255, 0.25)" : "#007AFF15",
                inputBg: darkMode ? "#2C2C2E" : "#F2F2F7",
                danger: "#FF3B30",
                gray: darkMode ? "#3A3A3C" : "#E5E5EA"
            };

            const handleCountChange = (delta) => {
                const now = Date.now();
                if (delta === lastDelta.current && (now - lastClickTime.current) < 2000 && lastClickTime.current !== 0) {
                    setWarning({ message: "押し間違い！", type: "danger" });
                    setTimeout(() => setWarning({ message: null, type: null }), 1200);
                    return;
                } 
                lastClickTime.current = now;
                lastDelta.current = delta; 
                let newCount = currentProject.count + delta;
                if (newCount < 0) return;

                if (popupTimeoutRef.current) clearTimeout(popupTimeoutRef.current);

                if (delta > 0 && activePart && activePart.maxRow > 0 && newCount >= activePart.maxRow) {
                    if (activePartIndex < parsedParts.length - 1) {
                        fireConfetti();
                        popupTimeoutRef.current = setTimeout(() => {
                            if (confirm(`🎉 ${activePart.partName} 終了！\n次のパーツに進みますか？`)) {
                                updateProject({ ...currentProject, count: 0, currentPartIndex: activePartIndex + 1, history: [{ time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), action: "次へ", count: 0, isNegative: false }, ...(currentProject.history || [])].slice(0, 15) });
                            }
                        }, 2500);
                    } else if (activePartIndex === parsedParts.length - 1 && currentProject.count < activePart.maxRow) { fireConfetti(); }
                }

                if (delta > 0 && currentProject.targetCount > 0 && activePart && activePart.maxRow === 0 && newCount >= currentProject.targetCount && currentProject.count < currentProject.targetCount) { fireConfetti(); }

                if ("vibrate" in navigator) navigator.vibrate(15);
                if (delta > 0) {
                    const hit = allMilestones.find(m => m.step === newCount && !m.isPattern);
                    if (hit && lastAlertedCount.current !== newCount) {
                        setActiveAlert(hit.action);
                        lastAlertedCount.current = newCount;
                    }
                }
                const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                updateProject({ ...currentProject, count: newCount, history: [{ time: timeStr, action: delta > 0 ? "+1" : "-1", count: newCount, isNegative: delta < 0 }, ...(currentProject.history || [])].slice(0, 15) });
            };

            const clearHistory = () => {
                if (confirm("この作品のすべての履歴を削除しますか？\n（現在の段数はそのまま残ります）")) {
                    updateProject({ ...currentProject, history: [] });
                    setHistoryExpanded(false);
                }
            };

            const displayedHistory = useMemo(() => {
                const historyList = currentProject.history || [];
                if (historyExpanded) return historyList; 
                return historyList.slice(0, 5); 
            }, [currentProject.history, historyExpanded]);

            const statusDisplay = useMemo(() => {
                if (warning.message) return <div style={{ color: theme.danger, fontWeight: "bold" }}>⚠️ {warning.message}</div>;
                const displayElements = [];
                const activePattern = (currentProject.rules || []).find(r => r.isPattern && currentProject.count >= r.start && r.every > 0);
                if (activePattern) {
                    const diff = currentProject.count - activePattern.start;
                    const loopCount = Math.floor(diff / activePattern.every) + 1;
                    if (activePattern.times === 0 || loopCount <= activePattern.times) {
                        displayElements.push(<div key="pattern" className="pattern-status">{activePattern.action}: {(diff % activePattern.every) + 1}/{activePattern.every} ({loopCount}回目)</div>);
                    }
                }
                const nextGoal = allMilestones.find(m => m.step > currentProject.count && !m.isPattern);
                if (nextGoal) { displayElements.push(<button key="next" onClick={() => setScheduleOpen(true)} className="next-status">次は {nextGoal.step}段 ({nextGoal.action}) ▾</button>); }
                return <div style={{ display: "flex", gap: 8, flexWrap: "wrap", justifyContent: "center" }}>{displayElements.length > 0 ? displayElements : <div style={{opacity:0.3, fontSize:12}}>目標なし</div>}</div>;
            }, [currentProject.count, currentProject.rules, warning, allMilestones, theme]);

            const StepInput = ({ label, value, onChange }) => (
                <div style={{ flex: 1 }}>
                    <span style={{ fontSize: 11, opacity: 0.6, marginBottom: 4, display: "block" }}>{label}</span>
                    <div style={{ display: "flex", alignItems: "center", background: theme.inputBg, borderRadius: 12, padding: "2px" }}>
                        <button style={{ width: 35, height: 35, border: "none", background: "none", color: theme.accent, fontSize: 20 }} onClick={() => onChange(Math.max(0, value - 1))}>−</button>
                        <input type="number" value={value} onChange={e => onChange(Number(e.target.value))} style={{ flex: 1, border: "none", background: "none", textAlign: "center", color: theme.text, fontSize: 16, width: "100%" }} />
                        <button style={{ width: 35, height: 35, border: "none", background: "none", color: theme.accent, fontSize: 20 }} onClick={() => onChange(value + 1)}>+</button>
                    </div>
                </div>
            );

            // メイン画面用の「現在の段」のミニチャート行プレビュー
            const miniChartRowPreviewElement = useMemo(() => {
                const cConfig = currentProject.chartConfig || { rows: 4, cols: 5, grid: {}, colorMap: { 'W': '#FFFFFF', 'B': '#333333', 'U': '#007AFF' } };
                // 次に編む段（count + 1）のグリッド色情報を取得
                const targetRow = currentProject.count + 1;
                if (targetRow > cConfig.rows) return null; // チャート範囲外なら非表示

                let cells = [];
                for (let c = 1; c <= cConfig.cols; c++) {
                    const colorKey = cConfig.grid[`${targetRow}-${c}`] || 'W';
                    const colorHex = cConfig.colorMap[colorKey];
                    cells.push(<div key={c} className="mini-preview-cell" style={{ backgroundColor: colorHex }} />);
                }
                return (
                    <div style={{ marginTop: 8, textAlign: "center" }}>
                        <span style={{ fontSize: 11, opacity: 0.5, display: "block", marginBottom: 3 }}>次段のチャートプレビュー ({targetRow}段目)</span>
                        <div className="mini-chart-row-preview">{cells}</div>
                    </div>
                );
            }, [currentProject.count, currentProject.chartConfig]);

            return (
                <div style={{ minHeight: "100vh", padding: "calc(env(safe-area-inset-top) + 15px) 20px 60px", background: theme.bg, color: theme.text }}>
                    <div className="bg-illust">🧶</div>
                    
                    <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:20, gap: 10}}>
                        <div style={{display:"flex", gap:8, overflowX:"auto", flex: 1, paddingBottom: 5, scrollbarWidth: "none"}}>
                            {projects.map(p => (
                                <button key={p.id} onClick={() => setSelectedId(p.id)} style={{ border:"none", borderRadius:12, padding:"10px 18px", fontWeight:"bold", whiteSpace:"nowrap", background: p.id === selectedId ? theme.accent : theme.gray, color: p.id === selectedId ? "#FFF" : theme.text }}>{p.name}</button>
                            ))}
                        </div>
                        <div style={{display:"flex", gap: 6, flexShrink: 0}}>
                            <button style={{background:theme.gray, border:"none", borderRadius:12, width:42, height:42, fontSize:18}} title="チャートエディタ" onClick={() => setChartModalOpen(true)}>📊</button>
                            <button style={{background:theme.gray, border:"none", borderRadius:12, width:42, height:42, fontSize:18}} title="メモ欄" onClick={() => setMemoModalOpen(true)}>💭</button>
                            <button style={{background:theme.gray, border:"none", borderRadius:12, width:42, height:42, fontSize:18}} title="ゲージ換算表" onClick={() => setSizeTableOpen(true)}>📐</button>
                            <button style={{background:theme.gray, border:"none", borderRadius:12, width:42, height:42, fontSize:16, fontWeight:"bold"}} onClick={() => setMainMenuOpen(true)}>≡</button>
                        </div>
                    </div>

                    <div style={{ borderRadius: "40px", padding: "25px 20px", textAlign: "center", background: theme.card, boxShadow: "0 10px 30px rgba(0,0,0,0.1)", marginBottom: 20 }}>
                        {parsedParts.length > 1 && activePart && (
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, padding: "0 10px" }}>
                                <button className="part-nav-btn" disabled={activePartIndex === 0} style={{ opacity: activePartIndex === 0 ? 0.3 : 1 }} onClick={() => updateProject({ ...currentProject, currentPartIndex: activePartIndex - 1, count: 0 })}>◀ 前</button>
                                <span style={{ fontSize: 12, fontWeight: "bold", opacity: 0.7 }}>{activePart.partName} ({activePartIndex + 1}/{parsedParts.length})</span>
                                <button className="part-nav-btn" disabled={activePartIndex === parsedParts.length - 1} style={{ opacity: activePartIndex === parsedParts.length - 1 ? 0.3 : 1 }} onClick={() => updateProject({ ...currentProject, currentPartIndex: activePartIndex + 1, count: 0 })}>次 ▶</button>
                            </div>
                        )}
                        <div style={{minHeight: 40, display:"flex", justifyContent:"center", alignItems:"center"}}>{statusDisplay}</div>
                        <div style={{ fontSize: "120px", fontWeight: "900", lineHeight: 1, margin: "10px 0" }}>{currentProject.count}</div>
                        {progressInfo && (
                            <div className="progress-container">
                                <div className="progress-bar" style={{ width: `${progressInfo.percent}%`, background: progressInfo.rawPercent >= 100 ? "#34C759" : theme.accent }}></div>
                                <div className="progress-label" style={{ color: progressInfo.percent > 50 ? "#FFF" : theme.text }}>{progressInfo.text}</div>
                            </div>
                        )}
                        <div style={{ display: "flex", gap: "15px", marginTop: "10px" }}>
                            <button className="btn-active" onClick={() => handleCountChange(-1)} style={{ width: "80px", height: "85px", borderRadius: "25px", border: "none", fontSize: "32px", background: theme.gray, color: theme.text }}>−</button>
                            <button className="btn-active" onClick={() => handleCountChange(1)} style={{ flex: 1, height: "85px", borderRadius: "25px", border: "none", fontSize: "40px", background: theme.accent, color: "white", fontWeight: "bold" }}>＋</button>
                        </div>
                    </div>

                    {currentInstruction && activePart && (
                        <div className="pattern-instruction-box">
                            <div className="part-badge">{activePart.partName}</div>
                            <div style={{ fontSize: 12, fontWeight: "bold", color: "#FF9500", marginBottom: 4 }}>📋 指示 ({currentInstruction.row}段目)</div>
                            <div style={{ fontSize: 16, fontWeight: "bold", lineHeight: 1.4 }}>{currentInstruction.text}</div>
                            {miniChartRowPreviewElement}
                        </div>
                    )}

                    <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginTop: 15, marginBottom: 10}}>
                        <span style={{fontSize:13, fontWeight:"bold", opacity:0.5}}>ルール</span>
                        <button onClick={() => { setEditingRuleIndex(null); setRuleStart(currentProject.count); setRuleEvery(10); setRuleTimes(0); setRuleAction("模様編み"); setIsPatternMode(true); setRuleModalOpen(true); }} style={{background:"none", border:"none", color:theme.accent, fontWeight:"bold", fontSize:13}}>+ 追加</button>
                    </div>

                    {(currentProject.rules || []).map((r, i) => (
                        <div key={i} onClick={() => { setEditingRuleIndex(i); setRuleStart(r.start); setRuleEvery(r.every); setRuleTimes(r.times); setRuleAction(r.action); setIsPatternMode(!!r.isPattern); setRuleModalOpen(true); }} className="rule-card" style={{ padding: "16px 18px", background: r.isPattern ? theme.rulePatternBg : theme.ruleNormalBg, borderRadius: "16px", marginBottom: "10px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                            <div style={{display:"flex", flexDirection:"column"}}>
                                <span style={{fontSize:15, fontWeight:"bold", color: r.isPattern ? theme.accent : theme.text}}>{r.action}</span>
                                <span style={{fontSize:12, opacity:0.6}}>{r.start}段〜 {r.every}段毎</span>
                            </div>
                            <span style={{fontSize:18, opacity:0.3}}>›</span>
                        </div>
                    ))}

                    <span style={{fontSize:13, fontWeight:"bold", opacity:0.5, marginTop:25, display:"block", marginBottom:10}}>履歴</span>
                    <div style={{background: theme.card, borderRadius: "20px", padding: "5px 18px", marginBottom: 20}}>
                        {displayedHistory.length === 0 ? (
                            <div style={{ padding: "15px 0", opacity: 0.3, fontSize: 13, textAlign: "center" }}>履歴がありません</div>
                        ) : (
                            displayedHistory.map((h, i, arr) => (
                                <div key={i} className="history-item" style={{ borderBottom: (i === arr.length - 1 && !historyExpanded) ? "none" : `1px solid ${theme.gray}44` }}>
                                    <div style={{display:"flex", alignItems:"center", gap: 10}}>
                                        <span style={{opacity:0.5, fontSize:12}}>{h.time}</span>
                                        <span style={{fontSize:11, background: h.isNegative ? theme.danger + "22" : theme.accent + "22", color: h.isNegative ? theme.danger : theme.accent, padding: "2px 6px", borderRadius: 6, fontWeight: "bold"}}>{h.action}</span>
                                    </div>
                                    <span style={{fontWeight:"900", fontSize: 18, color: h.isNegative ? theme.danger : theme.accent}}>{h.count}段</span>
                                </div>
                            ))
                        )}
                        
                        {(currentProject.history || []).length > 5 && (
                            <button 
                                onClick={() => setHistoryExpanded(!historyExpanded)} 
                                style={{ width: "100%", background: "none", border: "none", color: theme.accent, fontSize: 13, fontWeight: "bold", padding: "12px 0", cursor: "pointer", borderTop: historyExpanded ? `1px solid ${theme.gray}44` : "none" }}
                            >
                                {historyExpanded ? "履歴を折りたたむ (▲)" : `すべての履歴を表示 (+ ${(currentProject.history || []).length - 5}件)`}
                            </button>
                        )}

                        {historyExpanded && (
                            <div style={{ borderTop: `1px solid ${theme.gray}44`, padding: "10px 0 5px", display: "flex", justifyContent: "center" }}>
                                <button 
                                    onClick={clearHistory}
                                    style={{ background: "none", border: "none", color: theme.danger, fontSize: 12, fontWeight: "bold", padding: "8px 15px", borderRadius: 8 }}
                                >
                                    🗑️ この作品の履歴をすべて削除
                                </button>
                            </div>
                        )}
                    </div>

                    {/* 【新規】チャートエディターポップアップ */}
                    {chartModalOpen && (
                        <div class="chart-popup-overlay" onClick={() => setChartModalOpen(false)}>
                            <div class="chart-popup-content" style={{ background: theme.card, color: theme.text }} onClick={e => e.stopPropagation()}>
                                <h3 style={{ margin: "0 0 15px", textAlign: "center" }}>📊 チャート設定（パーツ1連動）</h3>
                                
                                <div style={{ display: "flex", gap: "10px", marginBottom: "15px" }}>
                                    <StepInput label="縦 (段数)" value={chartRowsInput} onChange={setChartRowsInput} />
                                    <StepInput label="横 (目数)" value={chartColsInput} onChange={setChartColsInput} />
                                </div>
                                <button onClick={rebuildChartGrid} style={{ width: "100%", background: theme.accent, color: "#FFF", border: "none", borderRadius: 12, padding: "10px", fontWeight: "bold", marginBottom: 20 }}>
                                    サイズを確定して適用
                                </button>

                                <div class="palette-selector">
                                    <button class={`palette-btn ${selectedPenColor === 'W' ? 'selected' : ''}`} style={{ backgroundColor: currentChartConfig.colorMap['W'], border: "1px solid #ccc" }} onClick={() => setSelectedPenColor('W')} title="白" />
                                    <button class={`palette-btn ${selectedPenColor === 'B' ? 'selected' : ''}`} style={{ backgroundColor: currentChartConfig.colorMap['B'] }} onClick={() => setSelectedPenColor('B')} title="黒" />
                                    <button class={`palette-btn ${selectedPenColor === 'U' ? 'selected' : ''}`} style={{ backgroundColor: currentChartConfig.colorMap['U'] }} onClick={() => setSelectedPenColor('U')} title="青" />
                                </div>
                                <p style={{ fontSize: 11, opacity: 0.6, textAlign: "center", margin: "5px 0 15px" }}>※色を選択し、下のマスをタップして塗ります</p>

                                <div class="chart-editor-grid" style={{ gridTemplateColumns: `repeat(${currentChartConfig.cols}, 36px)` }}>
                                    {(() => {
                                        let gridCells = [];
                                        const cGrid = currentChartConfig.grid || {};
                                        // 編み図なので上から下に、段数は大きい順(rowsから1)にループ
                                        for (let r = currentChartConfig.rows; r >= 1; r--) {
                                            for (let c = 1; c <= currentChartConfig.cols; c++) {
                                                const colorKey = cGrid[`${r}-${c}`] || 'W';
                                                const colorHex = currentChartConfig.colorMap[colorKey];
                                                const isCurrentRow = r === (currentProject.count + 1);

                                                gridCells.push(
                                                    <div 
                                                        key={`${r}-${c}`} 
                                                        class={`chart-editor-cell ${isCurrentRow ? 'chart-cell-highlight' : ''}`}
                                                        style={{ backgroundColor: colorHex }}
                                                        onClick={() => handleCellClick(r, c)}
                                                        title={`${r}段目-${c}目`}
                                                    />
                                                );
                                            }
                                        }
                                        return gridCells;
                                    })()}
                                </div>

                                <button onClick={() => setChartModalOpen(false)} style={{ width: "100%", background: theme.gray, color: theme.text, border: "none", borderRadius: 14, padding: "12px", fontWeight: "bold", marginTop: 15 }}>
                                    閉じてカウンターに戻る
                                </button>
                            </div>
                        </div>
                    )}

                    {/* メモモーダル */}
                    {memoModalOpen && (
                        <div style={{ position: "fixed", top: 0, left: 0, width: "100%", height: "100%", background: "rgba(0,0,0,0.5)", display: "flex", justifyContent: "center", alignItems: "center", z-index: 1500, padding: 20 }} onClick={() => setMemoModalOpen(false)}>
                            <div style={{ background: theme.card, width: "100%", maxTarget: "400px", maxWidth: "400px", borderRadius: "30px", padding: "25px", animation: "fadeIn 0.2s ease" }} onClick={e => e.stopPropagation()}>
                                <h3 style={{ margin: "0 0 15px 0", textAlign: "center" }}>💭 作品メモ</h3>
                                <textarea 
                                    ref={textareaRef}
                                    className="auto-grow-textarea"
                                    style={{ background: theme.inputBg, color: theme.text }}
                                    placeholder="自由になんでもメモできます（使用した毛糸、針の太さ、リンクなど）"
                                    value={memoInput}
                                    onChange={e => { setMemoInput(e.target.value); updateProject({ ...currentProject, memo: e.target.value }); }}
                                />
                                <button onClick={() => setMemoModalOpen(false)} style={{ width: "100%", background: theme.accent, color: "#FFF", border: "none", borderRadius: "14px", padding: "12px", fontWeight: "bold", marginTop: "15px" }}>閉じる</button>
                            </div>
                        </div>
                    )}

                    {/* ゲージ・サイズ換算モーダル */}
                    {sizeTableOpen && (
                        <div style={{ position: "fixed", top: 0, left: 0, width: "100%", height: "100%", background: "rgba(0,0,0,0.5)", display: "flex", justifyContent: "center", alignItems: "center", z-index: 1500, padding: 20 }} onClick={() => setSizeTableOpen(false)}>
                            <div style={{ background: theme.card, width: "100%", maxWidth: "440px", maxHeight: "85vh", overflowY: "auto", borderRadius: "30px", padding: "25px" }} onClick={e => e.stopPropagation()}>
                                <h3 style={{ margin: "0 0 15px 0", textAlign: "center" }}>📐 ゲージ・標準サイズ換算</h3>
                                <div style={{ display: "flex", background: theme.inputBg, borderRadius: "12px", padding: "4px", marginBottom: "15px" }}>
                                    <button onClick={() => setSizeTab("crochet")} style={{ flex: 1, padding: "8px", border: "none", borderRadius: "8px", background: sizeTab === "crochet" ? theme.card : "none", color: theme.text, fontWeight: "bold", fontSize: 13 }}>かぎ針/棒針号数</button>
                                    <button onClick={() => setSizeTab("ladies")} style={{ flex: 1, padding: "8px", border: "none", borderRadius: "8px", background: sizeTab === "ladies" ? theme.card : "none", color: theme.text, fontWeight: "bold", fontSize: 13 }}>JIS婦人標準</button>
                                </div>
                                {sizeTab === "crochet" ? (
                                    <table className="size-table">
                                        <thead><tr><th>棒針号数</th><th>規格 (mm)</th><th>かぎ針号数</th><th>規格 (mm)</th></tr></thead>
                                        <tbody>
                                            <tr><td>2号</td><td>2.7</td><td>2/0号</td><td>2.0</td></tr>
                                            <tr><td>3号</td><td>3.0</td><td>3/0号</td><td>2.3</td></tr>
                                            <tr><td>4号</td><td>3.3</td><td>4/0号</td><td>2.5</td></tr>
                                            <tr><td>5号</td><td>3.6</td><td>5/0号</td><td>3.0</td></tr>
                                            <tr><td>6号</td><td>3.9</td><td>6/0号</td><td>3.5</td></tr>
                                            <tr><td>7号</td><td>4.2</td><td>7/0号</td><td>4.0</td></tr>
                                            <tr><td>8号</td><td>4.5</td><td>8/0号</td><td>4.5</td></tr>
                                            <tr><td>9号</td><td>4.8</td><td>7.5/0号</td><td>5.0</td></tr>
                                            <tr><td>10号</td><td>5.1</td><td>8/0号</td><td>5.0</td></tr>
                                        </tbody>
                                    </table>
                                ) : (
                                    <table className="size-table">
                                        <thead><tr><th>部位</th><th>Mサイズ (cm)</th><th>Lサイズ (cm)</th></tr></thead>
                                        <tbody>
                                            <tr><td>バスト</td><td>79〜87</td><td>86〜94</td></tr>
                                            <tr><td>ウエスト</td><td>64〜70</td><td>69〜77</td></tr>
                                            <tr><td>ヒップ</td><td>87〜95</td><td>92〜100</td></tr>
                                            <tr><td>背肩幅</td><td>38</td><td>39</td></tr>
                                            <tr><td>背丈</td><td>38</td><td>38</td></tr>
                                            <tr><td>袖丈</td><td>53.5</td><td>54.5</td></tr>
                                        </tbody>
                                    </table>
                                )}
                                <button onClick={() => setSizeTableOpen(false)} style={{ width: "100%", background: theme.accent, color: "#FFF", border: "none", borderRadius: "14px", padding: "12px", fontWeight: "bold", marginTop: "20px" }}>閉じる</button>
                            </div>
                        </div>
                    )}

                    {/* ルール追加モーダル */}
                    {ruleModalOpen && (
                        <div style={{ position: "fixed", top: 0, left: 0, width: "100%", height: "100%", background: "rgba(0,0,0,0.5)", display: "flex", justifyContent: "center", alignItems: "center", z-index: 1500, padding: 20 }} onClick={() => setRuleModalOpen(false)}>
                            <div style={{ background: theme.card, width: "100%", maxWidth: "400px", borderRadius: "30px", padding: "25px" }} onClick={e => e.stopPropagation()}>
                                <h3 style={{ margin: "0 0 20px 0", textAlign: "center" }}>{editingRuleIndex !== null ? "ルールの編集" : "ルールの追加"}</h3>
                                <div style={{ display: "flex", background: theme.inputBg, borderRadius: "12px", padding: "4px", marginBottom: "20px" }}>
                                    <button onClick={() => setIsPatternMode(true)} style={{ flex: 1, padding: "10px", border: "none", borderRadius: "8px", background: isPatternMode ? theme.card : "none", color: theme.text, fontWeight: "bold", fontSize: 13 }}>🔁 周期パターン表示</button>
                                    <button onClick={() => setIsPatternMode(false)} style={{ flex: 1, padding: "10px", border: "none", borderRadius: "8px", background: !isPatternMode ? theme.card : "none", color: theme.text, fontWeight: "bold", fontSize: 13 }}>⚠️ 指定段でアラート</button>
                                </div>
                                <div style={{ display: "flex", gap: "10px", marginBottom: "15px" }}>
                                    <StepInput label="開始段" value={ruleStart} onChange={setRuleStart} />
                                    <StepInput label="何段ごと" value={ruleEvery} onChange={setRuleEvery} />
                                </div>
                                <div style={{ marginBottom: "20px" }}>
                                    <StepInput label={isPatternMode ? "繰り返す回数 (0で無限)" : "繰り返す回数 (0で1回のみ)"} value={ruleTimes} onChange={setRuleTimes} />
                                </div>
                                <div style={{ marginBottom: "25px" }}>
                                    <span style={{ fontSize: 11, opacity: 0.6, marginBottom: 6, display: "block" }}>通知メッセージ / 模様名</span>
                                    <input type="text" value={ruleAction} onChange={e => setRuleAction(e.target.value)} style={{ width: "100%", padding: "12px 14px", border: "none", borderRadius: "12px", background: theme.inputBg, color: theme.text, fontSize: 16 }} placeholder="例: 減目、縄編みなど" />
                                </div>
                                <div style={{ display: "flex", gap: "12px" }}>
                                    {editingRuleIndex !== null && (
                                        <button onClick={() => { const newRules = [...(currentProject.rules || [])]; newRules.splice(editingRuleIndex, 1); updateProject({ ...currentProject, rules: newRules }); setRuleModalOpen(false); }} style={{ flex: 1, background: "none", border: `1px solid ${theme.danger}`, color: theme.danger, borderRadius: "14px", padding: "12px", fontWeight: "bold" }}>削除</button>
                                    )}
                                    <button onClick={() => {
                                        const newRule = { start: ruleStart, every: ruleEvery, times: ruleTimes, action: ruleAction || "指定動作", isPattern: isPatternMode };
                                        let newRules = [...(currentProject.rules || [])];
                                        if (editingRuleIndex !== null) { newRules[editingRuleIndex] = newRule; } else { newRules.push(newRule); }
                                        updateProject({ ...currentProject, rules: newRules });
                                        setRuleModalOpen(false);
                                    }} style={{ flex: 2, background: theme.accent, color: "#FFF", border: "none", borderRadius: "14px", padding: "12px", fontWeight: "bold" }}>保存</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* スケジュール（目標一覧）モーダル */}
                    {scheduleOpen && (
                        <div style={{ position: "fixed", top: 0, left: 0, width: "100%", height: "100%", background: "rgba(0,0,0,0.5)", display: "flex", justifyContent: "center", alignItems: "center", z-index: 1500, padding: 20 }} onClick={() => setScheduleOpen(false)}>
                            <div style={{ background: theme.card, width: "100%", maxWidth: "400px", maxHeight: "75vh", overflowY: "auto", borderRadius: "30px", padding: "25px" }} onClick={e => e.stopPropagation()}>
                                <h3 style={{ margin: "0 0 15px 0", textAlign: "center" }}>🗓️ 今後のアラート予定</h3>
                                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                                    {allMilestones.filter(m => m.step > currentProject.count && !m.isPattern).slice(0, 10).map((m, i) => (
                                        <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "12px 14px", background: theme.inputBg, borderRadius: "12px", alignItems: "center" }}>
                                            <span style={{ fontWeight: "bold" }}>{m.action}</span>
                                            <span style={{ color: theme.accent, fontWeight: "900" }}>{m.step} 段目</span>
                                        </div>
                                    ))}
                                    {allMilestones.filter(m => m.step > currentProject.count && !m.isPattern).length === 0 && (
                                        <div style={{ padding: "20px 0", opacity: 0.3, textAlign: "center" }}>今後の予定はありません</div>
                                    )}
                                </div>
                                <button onClick={() => setScheduleOpen(false)} style={{ width: "100%", background: theme.accent, color: "#FFF", border: "none", borderRadius: "14px", padding: "12px", fontWeight: "bold", marginTop: "20px" }}>閉じる</button>
                            </div>
                        </div>
                    )}

                    {/* パターン指示入力モーダル */}
                    {patternModalOpen && (
                        <div style={{ position: "fixed", top: 0, left: 0, width: "100%", height: "100%", background: "rgba(0,0,0,0.5)", display: "flex", justifyContent: "center", alignItems: "center", z-index: 1500, padding: 20 }} onClick={() => setPatternModalOpen(false)}>
                            <div style={{ background: theme.card, width: "100%", maxWidth: "420px", borderRadius: "30px", padding: "25px" }} onClick={e => e.stopPropagation()}>
                                <h3 style={{ margin: "0 0 10px 0", textAlign: "center" }}>📝 英文パターン指示の入力</h3>
                                <p style={{ fontSize: 11, opacity: 0.5, margin: "0 0 15px 0", lineHeight: 1.4 }}>
                                    行頭に「◆」でパーツ名。ハイフン3つ「---」または「終わり」で行を区切ると複数パーツを切り替えられます。<br />
                                    例：<br /><b>◆前身頃<br />1段目: K1, P1<br />2-10段目の繰り返し<br />---<br />◆後身頃</b>
                                </p>
                                <textarea 
                                    style={{ width: "100%", height: "200px", padding: "12px", borderRadius: "12px", border: "none", background: theme.inputBg, color: theme.text, fontSize: 14, resize: "none" }}
                                    value={patternInput}
                                    onChange={e => { setPatternInput(e.target.value); updateProject({ ...currentProject, rawPatternText: e.target.value, currentPartIndex: 0 }); }}
                                    placeholder="ここにパターンを貼り付けます"
                                />
                                <button onClick={() => setPatternModalOpen(false)} style={{ width: "100%", background: theme.accent, color: "#FFF", border: "none", borderRadius: "14px", padding: "12px", fontWeight: "bold", marginTop: "15px" }}>保存して適用</button>
                            </div>
                        </div>
                    )}

                    {/* メインメニューモーダル */}
                    {mainMenuOpen && (
                        <div style={{ position: "fixed", top: 0, left: 0, width: "100%", height: "100%", background: "rgba(0,0,0,0.5)", display: "flex", justifyContent: "center", alignItems: "center", z-index: 1600, padding: 20 }} onClick={() => setMainMenuOpen(false)}>
                            <div style={{ background: theme.card, width: "100%", maxWidth: "380px", borderRadius: "30px", padding: "25px" }} onClick={e => e.stopPropagation()}>
                                <h3 style={{ margin: "0 0 20px 0", textAlign: "center" }}>⚙️ オプションメニュー</h3>
                                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px", marginBottom: "20px" }}>
                                    <button className="menu-grid-btn" onClick={() => { 
                                        const name = prompt("新しい作品の名前を入力してください", `作品${projects.length + 1}`);
                                        if (name) {
                                            const newProj = { id: Date.now(), name, count: 0, targetCount: 0, history: [], rules: [], rawPatternText: "", currentPartIndex: 0, memo: "", chartConfig: { rows: 4, cols: 5, grid: {}, colorMap: { 'W': '#FFFFFF', 'B': '#333333', 'U': '#007AFF' } } };
                                            setProjects([...projects, newProj]); setSelectedId(newProj.id); setMainMenuOpen(false);
                                        }
                                    }}><span>➕</span><span>作品を追加</span></button>
                                    <button className="menu-grid-btn" onClick={() => {
                                        if (projects.length <= 1) { alert("唯一の作品は削除できません。"); return; }
                                        if (confirm(`「${currentProject.name}」を完全に削除しますか？`)) {
                                            const filtered = projects.filter(p => p.id !== selectedId); setProjects(filtered); setSelectedId(filtered[0].id); setMainMenuOpen(false);
                                        }
                                    }} style={{ color: theme.danger }}><span>🗑️</span><span>作品を削除</span></button>
                                    <button className="menu-grid-btn" onClick={() => {
                                        const name = prompt("作品名の変更", currentProject.name);
                                        if (name) { updateProject({ ...currentProject, name }); }
                                    }}><span>✏️</span><span>名前変更</span></button>
                                    <button className="menu-grid-btn" onClick={() => {
                                        const tc = prompt("全体の目標段数を入力（0で指定なし）", currentProject.targetCount);
                                        if (tc !== null) { updateProject({ ...currentProject, targetCount: Number(tc) }); }
                                    }}><span>🏁</span><span>目標段数設定</span></button>
                                    <button className="menu-grid-btn" onClick={() => { setPatternModalOpen(true); setMainMenuOpen(false); }}><span>📝</span><span>パターン入力</span></button>
                                    <button className="menu-grid-btn" onClick={() => { setSpellInput(generateSingleSpell()); setSpellModalOpen(true); }}><span>🔮</span><span>復活の呪文</span></button>
                                    <button className="menu-grid-btn" onClick={() => {
                                        const tc = prompt("現在の段数を直接変更", currentProject.count);
                                        if (tc !== null && !isNaN(Number(tc))) { updateProject({ ...currentProject, count: Math.max(0, Number(tc)) }); }
                                    }}><span>🔢</span><span>段数直接変更</span></button>
                                    <button className="menu-grid-btn" onClick={() => setDarkMode(!darkMode)}><span>🌓</span><span>{darkMode ? "ライトモード" : "ダークモード"}</span></button>
                                </div>
                                <button onClick={() => setMainMenuOpen(false)} style={{ width: "100%", background: theme.gray, color: theme.text, border: "none", borderRadius: "14px", padding: "12px", fontWeight: "bold" }}>メニューを閉じる</button>
                            </div>
                        </div>
                    )}

                    {/* 復活の呪文モーダル */}
                    {spellModalOpen && (
                        <div style={{ position: "fixed", top: 0, left: 0, width: "100%", height: "100%", background: "rgba(0,0,0,0.5)", display: "flex", justifyContent: "center", alignItems: "center", z-index: 1700, padding: 20 }} onClick={() => setSpellModalOpen(false)}>
                            <div style={{ background: theme.card, width: "100%", maxWidth: "400px", borderRadius: "30px", padding: "25px" }} onClick={e => e.stopPropagation()}>
                                <h3 style={{ margin: "0 0 10px 0", textAlign: "center" }}>🔮 復活の呪文 (セーブ・ロード)</h3>
                                <p style={{ fontSize: 11, opacity: 0.5, marginBottom: 15, textAlign: "center" }}>現在の作品データ（チャートやルールを含む）のバックアップコードです</p>
                                <textarea 
                                    style={{ width: "100%", height: "110px", padding: "10px", borderRadius: "12px", border: "none", background: theme.inputBg, color: theme.text, fontSize: 12, wordBreak: "break-all", -webkit-user-select: text, user-select: text }}
                                    value={spellInput}
                                    onChange={e => setSpellInput(e.target.value)}
                                    placeholder="ここに復活の呪文を貼り付けて詠唱ボタンを押すと、データを復元できます"
                                />
                                <div style={{ display: "flex", gap: 10, marginTop: 15 }}>
                                    <button onClick={() => { navigator.clipboard.writeText(spellInput); alert("📋 呪文をクリップボードにコピーしました！"); }} style={{ flex: 1, background: theme.gray, color: theme.text, border: "none", borderRadius: "12px", padding: "10px", fontTarget: 13, fontWeight: "bold" }}>コピー</button>
                                    <button onClick={() => applySingleSpell(spellInput)} style={{ flex: 1, background: theme.accent, color: "#FFF", border: "none", borderRadius: "12px", padding: "10px", fontTarget: 13, fontWeight: "bold" }}>🪄 呪文を詠唱</button>
                                </div>
                                <button onClick={() => setSpellModalOpen(false)} style={{ width: "100%", background: theme.gray, color: theme.text, border: "none", borderRadius: "14px", padding: "12px", fontWeight: "bold", marginTop: 15 }}>閉じる</button>
                            </div>
                        </div>
                    )}

                    {/* 画面通知アラートのポップアップ */}
                    {activeAlert && (
                        <div style={{ position: "fixed", top: 0, left: 0, width: "100%", height: "100%", background: "rgba(0,0,0,0.6)", display: "flex", justifyContent: "center", alignItems: "center", z-index: 9999, padding: 20 }} onClick={() => setActiveAlert(null)}>
                            <div style={{ background: theme.card, width: "100%", maxWidth: "340px", borderRadius: "35px", padding: "30px 20px", textTarget: "center", boxShadow: "0 20px 50px rgba(0,0,0,0.3)", animation: "fadeIn 0.25s cubic-bezier(0.4, 0, 0.2, 1)", textAligen: "center" }} onClick={e => e.stopPropagation()}>
                                <div style={{ fontSize: "50px", marginBottom: "10px", textAlign: "center" }}>📢</div>
                                <h3 style={{ margin: "0 0 10px 0", color: theme.accent, fontSize: "22px", textAlign: "center" }}>ルールの通知</h3>
                                <p style={{ fontSize: "20px", fontWeight: "bold", margin: "0 0 25px 0", lineHeight: 1.4, textAlign: "center" }}>{activeAlert}</p>
                                <button onClick={() => setActiveAlert(null)} style={{ width: "100%", background: theme.accent, color: "#FFF", border: "none", borderRadius: "16px", padding: "14px", fontSize: "16px", fontWeight: "bold", boxShadow: "0 4px 12px rgba(0,122,255,0.3)" }}>確認しました</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
