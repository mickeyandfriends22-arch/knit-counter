<!DOCTYPE html><html lang="ja"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>編み物ログ Pro v3</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://fav.farm/🧶">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; background-color: #F2F2F7; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; overflow-x: hidden; }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
        @media (prefers-color-scheme: dark) { body { background-color: #000; } }
        .btn-active:active { transform: scale(0.96); opacity: 0.8; }
        .rule-card { transition: background 0.2s; }
        .rule-card:active { opacity: 0.6; }
        .history-item { display: flex; justify-content: space-between; padding: 12px 0; align-items: center; border-bottom: 1px solid rgba(120,120,128,0.1); }
        .bg-illust { position: fixed; bottom: -20px; right: -20px; font-size: 150px; opacity: 0.05; z-index: -1; pointer-events: none; }
        
        /* ステータス表示エリア */
        .status-container { min-height: 50px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 10px; }
        .next-step-alert { color: #FF3B30; font-weight: 800; font-size: 19px; margin-bottom: 2px; }
        .pattern-progress { color: #007AFF; font-weight: 700; font-size: 15px; opacity: 0.9; }
        
        .progress-container { width: 100%; background: #E5E5EA; height: 24px; border-radius: 12px; position: relative; overflow: hidden; margin: 15px 0; }
        @media (prefers-color-scheme: dark) { .progress-container { background: #2C2C2E; } }
        .progress-bar { height: 100%; background: #007AFF; transition: width 0.3s ease; border-radius: 12px; }
        .progress-label { position: absolute; width: 100%; top: 0; left: 0; height: 100%; display: flex; justify-content: center; align-items: center; font-size: 11px; font-weight: bold; color: #FFF; text-shadow: 0 1px 2px rgba(0,0,0,0.2); }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        function App() {
            const [projects, setProjects] = useState(() => {
                const saved = localStorage.getItem("knit-projects-v3");
                return saved ? JSON.parse(saved) : [{ id: Date.now(), name: "作品1", count: 0, targetCount: 0, history: [], rules: [] }];
            });
            const [selectedId, setSelectedId] = useState(() => Number(localStorage.getItem("selected-id-v3")) || (projects[0]?.id));
            const [warning, setWarning] = useState(null);
            const [ruleModalOpen, setRuleModalOpen] = useState(false);
            const [settingsOpen, setSettingsOpen] = useState(false);
            const [activeAlert, setActiveAlert] = useState(null);
            const [historyExpanded, setHistoryExpanded] = useState(false);
            const [editingRuleIndex, setEditingRuleIndex] = useState(null);
            const [darkMode, setDarkMode] = useState(() => {
                const saved = localStorage.getItem("dark-mode");
                return saved === null ? window.matchMedia('(prefers-color-scheme: dark)').matches : saved === "true";
            });
            
            const lastClickTime = useRef(0);
            const lastDelta = useRef(null); 
            const currentProject = useMemo(() => projects.find(p => p.id === selectedId) || projects[0], [projects, selectedId]);

            // ルール入力用
            const [ruleStart, setRuleStart] = useState(0);
            const [ruleEvery, setRuleEvery] = useState(0);
            const [ruleTimes, setRuleTimes] = useState(0);
            const [ruleAction, setRuleAction] = useState("");
            const [isPatternMode, setIsPatternMode] = useState(false);

            useEffect(() => {
                localStorage.setItem("knit-projects-v3", JSON.stringify(projects));
                localStorage.setItem("selected-id-v3", selectedId);
                localStorage.setItem("dark-mode", darkMode);
            }, [projects, selectedId, darkMode]);

            const allMilestones = useMemo(() => {
                let points = [];
                (currentProject.rules || []).forEach(r => {
                    const times = (r.times === 0 || !r.times) ? 500 : r.times;
                    for(let i=0; i < times; i++) {
                        points.push({ 
                            step: Number(r.start) + (i * Number(r.every)), 
                            action: r.action, 
                            isPattern: r.isPattern,
                            iteration: i + 1,
                            totalInLoop: Number(r.every)
                        });
                    }
                });
                return points.sort((a, b) => a.step - b.step);
            }, [currentProject.rules]);

            // 次の通常ルール（増減目など）
            const nextNormal = useMemo(() => {
                return allMilestones.find(m => m.step > currentProject.count && !m.isPattern);
            }, [allMilestones, currentProject.count]);

            // 現在進行中の編み込みルール
            const activePattern = useMemo(() => {
                return (currentProject.rules || []).find(r => 
                    r.isPattern && 
                    currentProject.count >= r.start && 
                    (r.times === 0 || currentProject.count < (Number(r.start) + Number(r.every) * Number(r.times)))
                );
            }, [currentProject.rules, currentProject.count]);

            // 編み込みの表示テキスト作成
            const patternDisplayText = useMemo(() => {
                if (!activePattern) return null;
                const relativePos = (currentProject.count - activePattern.start) % activePattern.every;
                const currentIteration = Math.floor((currentProject.count - activePattern.start) / activePattern.every) + 1;
                return `${relativePos + 1}/${activePattern.every} (${currentIteration}回目)`;
            }, [activePattern, currentProject.count]);

            const handleCountChange = (delta) => {
                const now = Date.now();
                if (delta === lastDelta.current && (now - lastClickTime.current) < 2000 && lastClickTime.current !== 0) {
                    setWarning("押し間違い注意！");
                    setTimeout(() => setWarning(null), 1200);
                    return;
                } 
                lastClickTime.current = now;
                lastDelta.current = delta; 
                const newCount = currentProject.count + delta;
                if (newCount < 0) return;

                if ("vibrate" in navigator) navigator.vibrate(15);
                
                if (delta > 0) {
                    const hit = allMilestones.find(m => m.step === newCount && !m.isPattern);
                    if (hit) setActiveAlert(hit.action);
                    if (currentProject.targetCount > 0 && newCount === currentProject.targetCount) {
                        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                    }
                }

                const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const newHistory = [{ time: timeStr, action: delta > 0 ? "+1" : "-1", count: newCount, isNegative: delta < 0 }, ...(currentProject.history || [])].slice(0, 20);
                setProjects(prev => prev.map(p => p.id === selectedId ? { ...p, count: newCount, history: newHistory } : p));
            };

            const theme = {
                bg: darkMode ? "#000" : "#F2F2F7",
                card: darkMode ? "#1C1C1E" : "#FFF",
                text: darkMode ? "#FFF" : "#000",
                accent: "#007AFF",
                gray: darkMode ? "#2C2C2E" : "#E5E5EA",
                input: darkMode ? "#3A3A3C" : "#F2F2F7"
            };

            return (
                <div style={{ minHeight: "100vh", padding: "calc(env(safe-area-inset-top) + 20px) 20px 80px", background: theme.bg, color: theme.text }}>
                    <div className="bg-illust">🧶</div>
                    
                    <div style={{display:"flex", gap:10, marginBottom:20, alignItems:"center"}}>
                        <div style={{display:"flex", gap:8, overflowX:"auto", flex:1}}>
                            {projects.map(p => (
                                <button key={p.id} onClick={() => setSelectedId(p.id)} style={{ border:"none", borderRadius:12, padding:"10px 20px", fontWeight:"bold", background: p.id === selectedId ? theme.accent : theme.gray, color: p.id === selectedId ? "#FFF" : theme.text }}>{p.name}</button>
                            ))}
                        </div>
                        <button onClick={() => setSettingsOpen(true)} style={{background:theme.gray, border:"none", borderRadius:12, width:44, height:44, color:theme.text, fontSize:20}}>⚙️</button>
                    </div>

                    <div style={{ borderRadius: "35px", padding: "30px 20px", textAlign: "center", background: theme.card, boxShadow: "0 10px 30px rgba(0,0,0,0.1)" }}>
                        <div className="status-container">
                            {warning ? (
                                <div style={{color:"#FF3B30", fontWeight:"bold"}}>⚠️ {warning}</div>
                            ) : (
                                <>
                                    {nextNormal && <div className="next-step-alert">次は{nextNormal.step}段目：{nextNormal.action}</div>}
                                    {patternDisplayText && <div className="pattern-progress">編み込み：{patternDisplayText}</div>}
                                </>
                            )}
                        </div>

                        <div style={{ fontSize: "110px", fontWeight: "900", lineHeight: 1, margin: "10px 0" }}>{currentProject.count}</div>
                        
                        {currentProject.targetCount > 0 && (
                            <div className="progress-container">
                                <div className="progress-bar" style={{ width: `${Math.min(100, (currentProject.count / currentProject.targetCount) * 100)}%` }}></div>
                                <div className="progress-label">{Math.floor((currentProject.count / currentProject.targetCount) * 100)}% ({currentProject.count}/{currentProject.targetCount})</div>
                            </div>
                        )}

                        <div style={{ display: "flex", gap: "15px", marginTop: 10 }}>
                            <button className="btn-active" onClick={() => handleCountChange(-1)} style={{ width: "80px", height: "80px", borderRadius: "25px", border: "none", fontSize: "30px", background: theme.gray, color: theme.text }}>−</button>
                            <button className="btn-active" onClick={() => handleCountChange(1)} style={{ flex: 1, height: "80px", borderRadius: "25px", border: "none", fontSize: "40px", background: theme.accent, color: "white", fontWeight: "bold" }}>＋</button>
                        </div>
                    </div>

                    <div style={{display:"flex", justifyContent:"space-between", marginTop:30, marginBottom:10}}>
                        <span style={{fontSize:13, fontWeight:"bold", opacity:0.5}}>ルール設定</span>
                        <button onClick={() => { setEditingRuleIndex(null); setRuleStart(currentProject.count); setRuleEvery(10); setRuleTimes(0); setRuleAction("模様編み"); setIsPatternMode(true); setRuleModalOpen(true); }} style={{background:"none", border:"none", color:theme.accent, fontWeight:"bold"}}>+ 追加</button>
                    </div>

                    {currentProject.rules.map((r, i) => (
                        <div key={i} onClick={() => { setEditingRuleIndex(i); setRuleStart(r.start); setRuleEvery(r.every); setRuleTimes(r.times); setRuleAction(r.action); setIsPatternMode(r.isPattern); setRuleModalOpen(true); }} className="rule-card" style={{ padding: 15, background: theme.card, borderRadius: 15, marginBottom: 10, display: "flex", justifyContent: "space-between", borderLeft: `5px solid ${r.isPattern ? theme.accent : "#FF3B30"}` }}>
                            <div>
                                <div style={{fontWeight:"bold"}}>{r.action} {r.isPattern && " (編み込み)"}</div>
                                <div style={{fontSize:12, opacity:0.6}}>{r.start}段目から{r.every}段ごと</div>
                            </div>
                            <span style={{opacity:0.3}}>Edit</span>
                        </div>
                    ))}

                    {ruleModalOpen && (
                        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", display: "flex", alignItems: "flex-end", zIndex: 1000 }} onClick={() => setRuleModalOpen(false)}>
                            <div style={{ width: "100%", borderRadius: "30px 30px 0 0", padding: 25, background: theme.card }} onClick={e => e.stopPropagation()}>
                                <h3>ルールの設定</h3>
                                <label style={{display:"flex", alignItems:"center", gap:10, marginBottom:15, background:theme.input, padding:12, borderRadius:12}}>
                                    <input type="checkbox" checked={isPatternMode} onChange={e => setIsPatternMode(e.target.checked)} style={{width:20, height:20}} />
                                    <span>編み込みモード (〇/〇表示)</span>
                                </label>
                                <div style={{display:"flex", gap:10, marginBottom:15}}>
                                    <div style={{flex:1}}>開始<input type="number" value={ruleStart} onChange={e=>setRuleStart(Number(e.target.value))} style={{width:"100%", padding:12, borderRadius:10, border:"none", background:theme.input, color:theme.text}}/></div>
                                    <div style={{flex:1}}>間隔<input type="number" value={ruleEvery} onChange={e=>setRuleEvery(Number(e.target.value))} style={{width:"100%", padding:12, borderRadius:10, border:"none", background:theme.input, color:theme.text}}/></div>
                                    <div style={{flex:1}}>回数<input type="number" value={ruleTimes} onChange={e=>setRuleTimes(Number(e.target.value))} style={{width:"100%", padding:12, borderRadius:10, border:"none", background:theme.input, color:theme.text}}/></div>
                                </div>
                                内容<input type="text" value={ruleAction} onChange={e=>setRuleAction(e.target.value)} style={{width:"100%", padding:12, borderRadius:10, border:"none", background:theme.input, color:theme.text, marginBottom:20}}/>
                                <div style={{display:"flex", gap:10}}>
                                    {editingRuleIndex !== null && <button onClick={() => { setProjects(prev => prev.map(p => p.id === selectedId ? {...p, rules: p.rules.filter((_, idx) => idx !== editingRuleIndex)} : p)); setRuleModalOpen(false); }} style={{flex:1, padding:15, borderRadius:12, border:"none", background:"#FF3B3022", color:"#FF3B30", fontWeight:"bold"}}>削除</button>}
                                    <button onClick={() => {
                                        const newRule = {start: ruleStart, every: ruleEvery, times: ruleTimes, action: ruleAction, isPattern: isPatternMode};
                                        setProjects(prev => prev.map(p => {
                                            if(p.id !== selectedId) return p;
                                            let rs = [...p.rules];
                                            if(editingRuleIndex !== null) rs[editingRuleIndex] = newRule; else rs.push(newRule);
                                            return {...p, rules: rs};
                                        }));
                                        setRuleModalOpen(false);
                                    }} style={{flex:2, padding:15, borderRadius:12, border:"none", background:theme.accent, color:"white", fontWeight:"bold"}}>保存</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {settingsOpen && (
                        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", display: "flex", alignItems: "center", padding: 20, zIndex: 1000 }} onClick={() => setSettingsOpen(false)}>
                            <div style={{ width: "100%", borderRadius: 25, padding: 25, background: theme.card }} onClick={e => e.stopPropagation()}>
                                <h3 style={{marginTop:0}}>設定</h3>
                                <div style={{marginBottom:15}}>
                                    段数リセット・修正
                                    <input type="number" value={currentProject.count} onChange={e => {
                                        const val = Number(e.target.value);
                                        setProjects(prev => prev.map(p => p.id === selectedId ? {...p, count: val} : p));
                                    }} style={{width:"100%", padding:12, borderRadius:10, border:"none", background:theme.input, color:theme.text, fontSize:18, fontWeight:"bold", textAlign:"center"}} />
                                </div>
                                <div style={{marginBottom:20}}>
                                    作品名
                                    <input type="text" value={currentProject.name} onChange={e => {
                                        const val = e.target.value;
                                        setProjects(prev => prev.map(p => p.id === selectedId ? {...p, name: val} : p));
                                    }} style={{width:"100%", padding:12, borderRadius:10, border:"none", background:theme.input, color:theme.text}} />
                                </div>
                                <button onClick={() => setDarkMode(!darkMode)} style={{width:"100%", padding:12, borderRadius:10, border:"none", background:theme.gray, color:theme.text, marginBottom:10}}>ダークモード切替</button>
                                <button onClick={() => {
                                    const name = prompt("新しい作品名");
                                    if(name) {
                                        const newP = { id: Date.now(), name, count: 0, targetCount: 0, history: [], rules: [] };
                                        setProjects([...projects, newP]);
                                        setSelectedId(newP.id);
                                        setSettingsOpen(false);
                                    }
                                }} style={{width:"100%", padding:12, borderRadius:10, border:"none", background:theme.accent, color:"white", marginBottom:10}}>＋ 新しい作品を追加</button>
                                <button onClick={() => setSettingsOpen(false)} style={{width:"100%", padding:12, borderRadius:10, border:"none", background:theme.text, color:theme.bg}}>閉じる</button>
                            </div>
                        </div>
                    )}

                    {activeAlert && (
                        <div style={{ position: "fixed", inset: 0, background: "#FF3B30", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 2000 }} onClick={() => setActiveAlert(null)}>
                            <div style={{ textAlign: "center", color: "white" }}>
                                <div style={{ fontSize: 70, fontWeight: "900" }}>{activeAlert}</div>
                                <div style={{ marginTop: 40, padding: "12px 40px", border: "3px solid white", borderRadius: 15, fontWeight: "bold" }}>了解</div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script></body></html>
