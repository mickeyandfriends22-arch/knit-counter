<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>KnitStudio</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://fav.farm/🧶">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --accent: #6366f1;
            --accent-light: #818cf8;
            --bg-light: #f8fafc;
            --bg-dark: #0f172a;
            --card-light: rgba(255, 255, 255, 0.8);
            --card-dark: rgba(30, 41, 59, 0.7);
        }
        body { 
            margin: 0; 
            background: var(--bg-light); 
            color: #1e293b;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent; 
            user-select: none; 
            transition: background 0.5s ease;
        }
        @media (prefers-color-scheme: dark) {
            body { background: var(--bg-dark); color: #f1f5f9; }
        }
        .glass {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn-press:active { transform: scale(0.95); transition: 0.1s; }
        .plus-btn {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
        }
        ::-webkit-scrollbar { display: none; }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        function App() {
            const [projects, setProjects] = useState(() => {
                const saved = localStorage.getItem("knit-projects-v2");
                return saved ? JSON.parse(saved) : [{ id: Date.now(), name: "First Project", count: 0, history: [], rules: [], memo: "" }];
            });
            const [selectedId, setSelectedId] = useState(() => Number(localStorage.getItem("selected-project-v2")) || projects[0]?.id);
            const [activeAlert, setActiveAlert] = useState(null);
            const [warning, setWarning] = useState("");
            const [settingsOpen, setSettingsOpen] = useState(false);
            const [scheduleOpen, setScheduleOpen] = useState(false);
            const [darkMode, setDarkMode] = useState(() => {
                const saved = localStorage.getItem("dark-mode");
                return saved === null ? window.matchMedia('(prefers-color-scheme: dark)').matches : saved === "true";
            });
            
            const lastClickTime = useRef(0);
            const currentProject = useMemo(() => projects.find(p => p.id === selectedId) || projects[0], [projects, selectedId]);

            const [ruleStart, setRuleStart] = useState(0);
            const [ruleEvery, setRuleEvery] = useState(0);
            const [ruleTimes, setRuleTimes] = useState(0);
            const [ruleAction, setRuleAction] = useState("増し目");

            useEffect(() => {
                localStorage.setItem("knit-projects-v2", JSON.stringify(projects));
                localStorage.setItem("selected-project-v2", selectedId);
                localStorage.setItem("dark-mode", darkMode);
                document.body.style.background = darkMode ? "#0f172a" : "#f8fafc";
            }, [projects, selectedId, darkMode]);

            useEffect(() => {
                if (settingsOpen) { setRuleStart(currentProject.count); setRuleEvery(0); setRuleTimes(0); }
            }, [settingsOpen]);

            const allMilestones = useMemo(() => {
                let points = [];
                (currentProject.rules || []).forEach(r => {
                    const times = r.times === 0 ? 100 : r.times;
                    for(let i=0; i < times; i++) { points.push({ step: r.start + (i * r.every), action: r.action }); }
                });
                return points.sort((a, b) => a.step - b.step);
            }, [currentProject.rules]);

            function updateProject(updated) { setProjects(prev => prev.map(p => p.id === updated.id ? updated : p)); }
            
            function addProject() {
                const name = prompt("Project Name", `Works ${projects.length + 1}`);
                if (name) {
                    const newProj = { id: Date.now(), name, count: 0, history: [], rules: [], memo: "" };
                    setProjects([...projects, newProj]);
                    setSelectedId(newProj.id);
                }
            }

            function addCount(amount) {
                const now = Date.now();
                if ("vibrate" in navigator) navigator.vibrate(20);
                if (amount > 0) {
                    const diff = (now - lastClickTime.current) / 1000;
                    if (diff < 1.5) setWarning("Double Check?"); else setWarning("");
                    lastClickTime.current = now;
                } else setWarning("");
                
                const newCount = Math.max(0, currentProject.count + amount);
                if (amount > 0) {
                    const hit = allMilestones.find(m => m.step === newCount);
                    if (hit) setActiveAlert(hit.action);
                }
                updateProject({
                    ...currentProject,
                    count: newCount,
                    history: [{ time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), action: amount > 0 ? "+1" : "-1", count: newCount }, ...(currentProject.history || [])].slice(0, 10)
                });
            }

            const theme = {
                card: darkMode ? "var(--card-dark)" : "var(--card-light)",
                text: darkMode ? "#f1f5f9" : "#1e293b",
                subText: darkMode ? "#94a3b8" : "#64748b",
                accent: "var(--accent)",
                input: darkMode ? "#334155" : "#e2e8f0"
            };

            const rulePreview = useMemo(() => {
                if (ruleEvery <= 0) return "";
                let previewSteps = [];
                for (let i = 0; i < 4; i++) previewSteps.push(`${ruleStart + (i * ruleEvery)}`);
                return previewSteps.join(" → ") + " ...";
            }, [ruleStart, ruleEvery]);

            const nextGoal = allMilestones.find(m => m.step > currentProject.count);

            return (
                <div style={{ minHeight: "100vh", padding: "calc(env(safe-area-inset-top) + 20px) 20px 100px", color: theme.text }}>
                    
                    {/* Header */}
                    <div style={{ display: "flex", alignItems: "center", marginBottom: 30, gap: 15 }}>
                        <div style={{ display: "flex", gap: 10, overflowX: "auto", flex: 1, paddingBottom: 5 }}>
                            {projects.map(p => (
                                <button key={p.id} onClick={() => setSelectedId(p.id)} style={{ border: "none", borderRadius: "14px", padding: "10px 20px", fontWeight: "600", whiteSpace: "nowrap", transition: "0.3s", background: p.id === selectedId ? theme.accent : theme.card, color: p.id === selectedId ? "#fff" : theme.text }} className="glass">{p.name}</button>
                            ))}
                        </div>
                        <button onClick={addProject} style={{ background: theme.card, border: "none", borderRadius: "14px", width: 44, height: 44, color: theme.accent, fontSize: 22 }} className="glass">+</button>
                    </div>

                    {/* Main Counter Display */}
                    <div style={{ background: theme.card, borderRadius: "48px", padding: "40px 20px 30px", textAlign: "center", position: "relative", marginBottom: 30 }} className="glass">
                        <div style={{ minHeight: 30, marginBottom: 10 }}>
                            {nextGoal && (
                                <span onClick={() => setScheduleOpen(true)} style={{ color: theme.accent, fontSize: 13, fontWeight: "bold", letterSpacing: "1px", textTransform: "uppercase" }}>
                                    Next: {nextGoal.step} {nextGoal.action} ⌵
                                </span>
                            )}
                        </div>
                        <div style={{ fontSize: "140px", fontWeight: "200", lineHeight: 1, margin: "10px 0", fontVariantNumeric: "tabular-nums" }}>{currentProject.count}</div>
                        <div style={{ color: "#ef4444", fontSize: 12, fontWeight: "bold", height: 20, opacity: warning ? 1 : 0 }}>{warning}</div>
                        
                        <div style={{ display: "flex", gap: 15, marginTop: 20 }}>
                            <button onClick={() => addCount(-1)} style={{ width: 80, height: 80, borderRadius: "30px", border: "none", background: theme.input, color: theme.text, fontSize: 30 }} className="btn-press">−</button>
                            <button onClick={() => addCount(1)} style={{ flex: 1, height: 80, borderRadius: "30px", border: "none", color: "#fff", fontSize: 35 }} className="btn-press plus-btn">＋</button>
                        </div>
                    </div>

                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginBottom: 30 }}>
                        <div style={{ background: theme.card, padding: 20, borderRadius: "28px" }} className="glass" onClick={() => setSettingsOpen(true)}>
                            <div style={{ fontSize: 12, color: theme.subText, fontWeight: "bold", marginBottom: 10 }}>RULES</div>
                            <div style={{ fontSize: 18, fontWeight: "bold" }}>{currentProject.rules?.length || 0} active</div>
                        </div>
                        <div style={{ background: theme.card, padding: 20, borderRadius: "28px" }} className="glass" onClick={() => setDarkMode(!darkMode)}>
                            <div style={{ fontSize: 12, color: theme.subText, fontWeight: "bold", marginBottom: 10 }}>THEME</div>
                            <div style={{ fontSize: 18, fontWeight: "bold" }}>{darkMode ? "Dark" : "Light"}</div>
                        </div>
                    </div>

                    {/* Memo & History Sidebar concept */}
                    <div style={{ fontSize: 13, fontWeight: "bold", color: theme.subText, marginBottom: 12, letterSpacing: "1px" }}>MEMO & RECENT</div>
                    <textarea 
                        style={{ width: "100%", height: 100, borderRadius: "24px", border: "none", padding: 20, background: theme.card, color: theme.text, fontSize: 15, marginBottom: 20 }} 
                        className="glass" placeholder="Notes..." value={currentProject.memo || ""} onChange={e => updateProject({...currentProject, memo: e.target.value})} 
                    />

                    <div style={{ background: theme.card, borderRadius: "24px", padding: "10px 20px" }} className="glass">
                        {currentProject.history?.slice(0, 5).map((h, i) => (
                            <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "15px 0", borderBottom: i === 4 ? "none" : `1px solid ${darkMode ? "rgba(255,255,255,0.05)" : "rgba(0,0,0,0.05)"}` }}>
                                <span style={{ color: theme.subText }}>{h.time}</span>
                                <span style={{ fontWeight: "bold" }}>{h.count} row</span>
                            </div>
                        ))}
                    </div>

                    {/* Settings Modal (Modern Drawer) */}
                    {settingsOpen && (
                        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)", display: "flex", alignItems: "flex-end", zIndex: 1000 }} onClick={() => setSettingsOpen(false)}>
                            <div style={{ width: "100%", borderTopLeftRadius: "40px", borderTopRightRadius: "40px", padding: "30px", background: darkMode ? "#1e293b" : "#fff", boxShadow: "0 -20px 40px rgba(0,0,0,0.2)" }} onClick={e => e.stopPropagation()}>
                                <div style={{ width: 40, height: 4, background: theme.input, borderRadius: 2, margin: "0 auto 20px" }} />
                                <h2 style={{ margin: "0 0 25px", fontSize: 24 }}>New Rule</h2>
                                
                                <div style={{ display: "flex", gap: 10, marginBottom: 25 }}>
                                    {[["Start", ruleStart, setRuleStart], ["Every", ruleEvery, setRuleEvery], ["Times", ruleTimes, setRuleTimes]].map(([l, v, s]) => (
                                        <div key={l} style={{ flex: 1 }}>
                                            <label style={{ fontSize: 11, fontWeight: "bold", color: theme.subText, display: "block", marginBottom: 8 }}>{l}</label>
                                            <input type="number" value={v} onChange={e => s(Number(e.target.value))} style={{ width: "100%", padding: "15px", borderRadius: "16px", border: "none", background: theme.input, color: theme.text, textAlign: "center", fontSize: 18, fontWeight: "bold" }} />
                                        </div>
                                    ))}
                                </div>

                                <label style={{ fontSize: 11, fontWeight: "bold", color: theme.subText, display: "block", marginBottom: 8 }}>ACTION</label>
                                <input type="text" value={ruleAction} onChange={e => setRuleAction(e.target.value)} style={{ width: "100%", padding: "18px", borderRadius: "16px", border: "none", background: theme.input, color: theme.text, fontSize: 16, marginBottom: 20 }} />

                                {rulePreview && <div style={{ textAlign: "center", color: theme.accent, fontWeight: "bold", marginBottom: 25, fontSize: 14 }}>{rulePreview}</div>}

                                <button onClick={() => {
                                    updateProject({...currentProject, rules: [...(currentProject.rules || []), {start: ruleStart, every: ruleEvery, times: ruleTimes, action: ruleAction}]});
                                    setSettingsOpen(false);
                                }} style={{ width: "100%", padding: "20px", background: theme.accent, color: "#fff", border: "none", borderRadius: "20px", fontSize: 18, fontWeight: "bold" }} className="plus-btn">Save Rule</button>
                                
                                <button onClick={() => { if(confirm("Reset this project?")){ updateProject({...currentProject, count:0, history:[], rules:[]}); setSettingsOpen(false); } }} style={{ width: "100%", padding: "15px", color: "#ef4444", border: "none", background: "none", marginTop: 10, fontWeight: "bold" }}>Reset Project</button>
                            </div>
                        </div>
                    )}

                    {/* Schedule Modal */}
                    {scheduleOpen && (
                        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000, padding: 20 }} onClick={() => setScheduleOpen(false)}>
                            <div style={{ width: "100%", maxWidth: 400, borderRadius: "40px", padding: "30px", background: darkMode ? "#1e293b" : "#fff" }} onClick={e => e.stopPropagation()}>
                                <h3 style={{ marginTop: 0 }}>Upcoming</h3>
                                <div style={{ maxHeight: "400px", overflowY: "auto", marginBottom: 20 }}>
                                    {allMilestones.filter(m => m.step > currentProject.count).slice(0, 10).map((m, i) => (
                                        <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "18px", borderRadius: "20px", marginBottom: 8, background: i === 0 ? theme.accent : theme.input, color: i === 0 ? "#fff" : theme.text }}>
                                            <span style={{ fontWeight: "bold" }}>{m.step} row</span>
                                            <span>{m.action}</span>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => setScheduleOpen(false)} style={{ width: "100%", padding: "15px", borderRadius: "18px", border: "none", background: theme.text, color: theme.card, fontWeight: "bold" }}>Close</button>
                            </div>
                        </div>
                    )}

                    {/* Notification Overlay */}
                    {activeAlert && (
                        <div style={{ position: "fixed", inset: 0, background: theme.accent, display: "flex", alignItems: "center", justifyContent: "center", zIndex: 2000 }} onClick={() => setActiveAlert(null)}>
                            <div style={{ textAlign: "center", color: "#fff" }}>
                                <div style={{ fontSize: 24, fontWeight: "bold", opacity: 0.8, marginBottom: 10 }}>TIME TO</div>
                                <div style={{ fontSize: 72, fontWeight: "900", letterSpacing: "-2px" }}>{activeAlert}</div>
                                <div style={{ marginTop: 40, fontSize: 18, fontWeight: "bold", padding: "15px 40px", border: "2px solid #fff", borderRadius: "50px" }}>Got it!</div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
