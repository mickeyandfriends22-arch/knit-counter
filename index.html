<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>編み物カウンター</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #F2F2F7; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            // --- ここから以前のプログラムと同じ内容 ---
            const [projects, setProjects] = useState(() => {
                const saved = localStorage.getItem("knit-projects");
                if (saved) return JSON.parse(saved);
                return [{ id: 1, name: "新しい作品", count: 0, history: [], rules: [], memo: "", repeat: 0, target: 0 }];
            });

            const [selectedId, setSelectedId] = useState(() => Number(localStorage.getItem("selected-project")) || 1);
            const [warning, setWarning] = useState("");
            const [activeAlert, setActiveAlert] = useState(null);
            const [settingsOpen, setSettingsOpen] = useState(false);
            const [darkMode, setDarkMode] = useState(() => localStorage.getItem("dark-mode") === "true");
            const [ruleOpen, setRuleOpen] = useState(false);
            
            const [ruleStart, setRuleStart] = useState(0);
            const [ruleEvery, setRuleEvery] = useState(3);
            const [ruleAction, setRuleAction] = useState("増し目");

            const currentProject = projects.find((p) => p.id === selectedId) || projects[0];

            useEffect(() => {
                localStorage.setItem("knit-projects", JSON.stringify(projects));
                localStorage.setItem("selected-project", selectedId);
                localStorage.setItem("dark-mode", darkMode);
            }, [projects, selectedId, darkMode]);

            function updateProject(updated) {
                setProjects((prev) => prev.map((p) => (p.id === updated.id ? updated : p)));
            }

            function addCount(amount) {
                if ("vibrate" in navigator) navigator.vibrate(15);
                const now = Date.now();
                const newCount = Math.max(0, currentProject.count + amount);
                let warningText = "";

                if (amount > 0) {
                    if (currentProject.history?.[0]) {
                        const interval = (now - currentProject.history[0].timestamp) / 1000;
                        if (interval < 1.5) warningText = "⚠️ 早すぎかも？";
                    }
                    const triggered = (currentProject.rules || []).find(r => newCount >= r.start && (newCount - r.start) % r.every === 0);
                    if (triggered) {
                        setActiveAlert(triggered.action);
                        warningText = `📌 ${triggered.action}`;
                    }
                }

                setWarning(warningText);
                updateProject({
                    ...currentProject,
                    count: newCount,
                    history: [{ timestamp: now, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), action: amount > 0 ? "+1" : "-1", count: newCount }, ...(currentProject.history || [])].slice(0, 30),
                });
            }

            const theme = {
                bg: darkMode ? "#000" : "#F2F2F7",
                card: darkMode ? "#1C1C1E" : "#FFF",
                text: darkMode ? "#FFF" : "#000",
                accent: "#007AFF"
            };

            const progress = currentProject.target > 0 ? Math.min(100, (currentProject.count / currentProject.target) * 100) : 0;

            // スタイル定義（簡略化して直接記述）
            const s = {
                container: { minHeight: "100vh", fontFamily: '-apple-system, sans-serif', padding: "20px 16px", background: theme.bg, color: theme.text },
                mainCard: { borderRadius: "32px", padding: "30px 20px", textAlign: "center", background: theme.card, boxShadow: "0 10px 30px rgba(0,0,0,0.1)" },
                bigNumber: { fontSize: "110px", fontWeight: "900", margin: "10px 0" },
                btn: { padding: "16px", borderRadius: "18px", border: "none", color: "white", fontWeight: "bold", fontSize: "16px" }
            };

            return (
                <div style={s.container}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "20px" }}>
                        <h2 style={{ margin: 0 }}>{currentProject.name}</h2>
                        <button onClick={() => setSettingsOpen(true)} style={{ background: "none", border: "none", fontSize: "24px" }}>⚙️</button>
                    </div>

                    <div style={s.mainCard} onClick={() => addCount(1)}>
                        <div style={s.bigNumber}>{currentProject.count}</div>
                        {currentProject.repeat > 0 && <div style={{color: theme.accent}}>模様: {(currentProject.count % currentProject.repeat) || currentProject.repeat} / {currentProject.repeat}段</div>}
                        <div style={{ height: "30px", marginTop: "10px", color: theme.accent }}>{warning}</div>
                        
                        <div style={{ display: "flex", gap: "10px", marginTop: "20px" }} onClick={e => e.stopPropagation()}>
                            <button onClick={() => addCount(-1)} style={{ ...s.btn, flex: 1, background: "#8E8E93" }}>-1</button>
                            <button onClick={() => setRuleOpen(true)} style={{ ...s.btn, flex: 2, background: theme.accent }}>ルール設定</button>
                        </div>
                    </div>

                    {/* メモ欄 */}
                    <div style={{ marginTop: "30px" }}>
                        <p style={{ fontSize: "12px", opacity: 0.5 }}>作品メモ</p>
                        <textarea 
                            style={{ width: "100%", height: "80px", borderRadius: "15px", border: "none", padding: "12px", background: theme.card, color: theme.text }}
                            value={currentProject.memo}
                            onChange={(e) => updateProject({...currentProject, memo: e.target.value})}
                        />
                    </div>

                    {/* 設定モーダル（簡易版） */}
                    {settingsOpen && (
                        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", padding: "20px", zIndex: 100 }}>
                            <div style={{ background: theme.card, padding: "20px", borderRadius: "20px" }}>
                                <h3>設定</h3>
                                <button onClick={() => setDarkMode(!darkMode)} style={{ width: "100%", padding: "10px", marginBottom: "10px" }}>
                                    モード切替 {darkMode ? "☀️" : "🌙"}
                                </button>
                                <button onClick={() => setSettingsOpen(false)} style={{ width: "100%", padding: "10px" }}>閉じる</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
