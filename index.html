<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>編み物ログ</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://fav.farm/🧶">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; background-color: #F2F2F7; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; overflow-x: hidden; }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
        @media (prefers-color-scheme: dark) { body { background-color: #000; } }
        ::-webkit-scrollbar { display: none; }
        .btn-active:active { transform: scale(0.96); opacity: 0.8; }
        .pattern-card { background: #FFF; border-radius: 15px; padding: 12px 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        @media (prefers-color-scheme: dark) { .pattern-card { background: #1C1C1E; } }
        .progress-bar { height: 6px; background: #E5E5EA; border-radius: 3px; overflow: hidden; margin-top: 8px; flex: 1; }
        @media (prefers-color-scheme: dark) { .progress-bar { background: #3A3A3C; } }
        .progress-fill { height: 100%; background: #007AFF; transition: width 0.3s ease; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        function App() {
            const [projects, setProjects] = useState(() => {
                const saved = localStorage.getItem("knit-projects-v2");
                return saved ? JSON.parse(saved) : [{ id: Date.now(), name: "作品1", count: 0, history: [], rules: [], memo: "" }];
            });
            const [selectedId, setSelectedId] = useState(() => Number(localStorage.getItem("selected-project")) || (projects[0]?.id));
            const [activeAlert, setActiveAlert] = useState(null);
            const [ruleModalOpen, setRuleModalOpen] = useState(false);
            const [settingsOpen, setSettingsOpen] = useState(false);
            const [editingRuleIndex, setEditingRuleIndex] = useState(null);
            const [darkMode, setDarkMode] = useState(() => {
                const saved = localStorage.getItem("dark-mode");
                return saved === null ? window.matchMedia('(prefers-color-scheme: dark)').matches : saved === "true";
            });
            
            const lastClickTime = useRef(0);
            const lastAlertedCount = useRef(null);

            const currentProject = useMemo(() => projects.find(p => p.id === selectedId) || projects[0], [projects, selectedId]);

            const [ruleStart, setRuleStart] = useState(0);
            const [ruleEvery, setRuleEvery] = useState(1);
            const [ruleTimes, setRuleTimes] = useState(0);
            const [ruleAction, setRuleAction] = useState("");

            useEffect(() => {
                localStorage.setItem("knit-projects-v2", JSON.stringify(projects));
                localStorage.setItem("selected-project", selectedId);
                localStorage.setItem("dark-mode", darkMode);
            }, [projects, selectedId, darkMode]);

            const theme = {
                bg: darkMode ? "#000" : "#F2F2F7",
                card: darkMode ? "#1C1C1E" : "#FFF",
                text: darkMode ? "#FFF" : "#000",
                accent: "#007AFF",
                ruleBg: darkMode ? "rgba(0, 122, 255, 0.15)" : "#EBF5FF",
                inputBg: darkMode ? "#2C2C2E" : "#F2F2F7",
                danger: "#FF3B30",
                gray: darkMode ? "#3A3A3C" : "#E5E5EA"
            };

            const updateProject = (updated) => setProjects(prev => prev.map(p => p.id === updated.id ? updated : p));

            const handleCountChange = (delta) => {
                const now = Date.now();
                if (delta > 0 && now - lastClickTime.current < 1500) return; // 連打防止
                lastClickTime.current = now;

                const newCount = currentProject.count + delta;
                if (newCount < 0) return;

                if (delta < 0) {
                    lastAlertedCount.current = null;
                } else {
                    // ルールに基づくアラート（周期が1以外＝単発または特定段数指定の場合）
                    const hit = currentProject.rules.find(r => r.every > 1 && (newCount - r.start) % r.every === 0 && (r.times === 0 || (newCount - r.start) / r.every < r.times));
                    if (hit && lastAlertedCount.current !== newCount) {
                        setActiveAlert(hit.action);
                        lastAlertedCount.current = newCount;
                    }
                }

                const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const newHistory = [{ time: timeStr, action: delta > 0 ? "+1" : "-1", count: newCount, isNegative: delta < 0 }, ...(currentProject.history || [])].slice(0, 10);
                updateProject({ ...currentProject, count: newCount, history: newHistory });
            };

            // 模様の進捗計算
            const activePatterns = useMemo(() => {
                return (currentProject.rules || []).filter(r => r.every > 1 && currentProject.count >= r.start).map(r => {
                    const elapsed = currentProject.count - r.start;
                    const currentInPattern = (elapsed % r.every) + 1;
                    const totalPatterns = Math.floor(elapsed / r.every) + 1;
                    return { ...r, currentInPattern, totalPatterns };
                });
            }, [currentProject.rules, currentProject.count]);

            return (
                <div style={{ minHeight: "100vh", padding: "calc(env(safe-area-inset-top) + 20px) 20px 40px", background: theme.bg, color: theme.text }}>
                    
                    {/* Header */}
                    <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom: 20}}>
                        <h2 style={{margin:0}}>{currentProject.name}</h2>
                        <button onClick={() => setSettingsOpen(true)} style={{background:theme.gray, border:"none", padding:"8px 15px", borderRadius:10, color:theme.text, fontWeight:"bold"}}>設定</button>
                    </div>

                    {/* Main Counter */}
                    <div style={{ background: theme.card, borderRadius: 30, padding: 30, textAlign: "center", marginBottom: 25, boxShadow: "0 10px 30px rgba(0,0,0,0.1)" }}>
                        <div style={{ fontSize: 13, opacity: 0.5, fontWeight: "bold" }}>TOTAL</div>
                        <div style={{ fontSize: 100, fontWeight: "900", lineHeight: 1, margin: "10px 0" }}>{currentProject.count}</div>
                        <div style={{ display: "flex", gap: 15 }}>
                            <button className="btn-active" onClick={() => handleCountChange(-1)} style={{ width: 80, height: 80, borderRadius: 20, border: "none", fontSize: 30, background: theme.gray, color: theme.text }}>−</button>
                            <button className="btn-active" onClick={() => handleCountChange(1)} style={{ flex: 1, height: 80, borderRadius: 20, border: "none", fontSize: 35, background: theme.accent, color: "white", fontWeight: "bold" }}>＋</button>
                        </div>
                    </div>

                    {/* Patterns Display */}
                    {activePatterns.length > 0 && (
                        <div style={{ marginBottom: 25 }}>
                            <div style={{ fontSize: 12, fontWeight: "bold", opacity: 0.5, marginBottom: 10 }}>模様の進捗</div>
                            {activePatterns.map((p, i) => (
                                <div key={i} className="pattern-card">
                                    <div style={{ flex: 1 }}>
                                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end" }}>
                                            <span style={{ fontWeight: "bold", fontSize: 16 }}>{p.action}</span>
                                            <span style={{ fontSize: 13, color: theme.accent, fontWeight: "bold" }}>{p.currentInPattern} / {p.every} 段目</span>
                                        </div>
                                        <div className="progress-bar">
                                            <div className="progress-fill" style={{ width: `${(p.currentInPattern / p.every) * 100}%` }}></div>
                                        </div>
                                        <div style={{ fontSize: 11, opacity: 0.5, marginTop: 5 }}>現在 {p.totalPatterns} 回目の繰り返し</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                        <span style={{ fontSize: 12, fontWeight: "bold", opacity: 0.5 }}>ルール・模様設定</span>
                        <button onClick={() => { setEditingRuleIndex(null); setRuleStart(currentProject.count); setRuleEvery(10); setRuleAction("模様A"); setRuleModalOpen(true); }} style={{ background: "none", border: "none", color: theme.accent, fontWeight: "bold", fontSize: 13 }}>+ 追加</button>
                    </div>

                    {currentProject.rules.map((r, i) => (
                        <div key={i} onClick={() => { setEditingRuleIndex(i); setRuleStart(r.start); setRuleEvery(r.every); setRuleAction(r.action); setRuleModalOpen(true); }} style={{ padding: 15, background: theme.ruleBg, borderRadius: 15, marginBottom: 10, display: "flex", justifyContent: "space-between", color: theme.accent }}>
                            <div>
                                <div style={{ fontWeight: "bold" }}>{r.action}</div>
                                <div style={{ fontSize: 12, opacity: 0.7 }}>{r.start}段目から {r.every}段周期</div>
                            </div>
                            <span style={{ opacity: 0.5 }}>›</span>
                        </div>
                    ))}

                    {/* Modals (Rule, Settings, Alert) */}
                    {ruleModalOpen && (
                        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "flex-end", zIndex: 1000, backdropFilter: "blur(4px)" }} onClick={() => setRuleModalOpen(false)}>
                            <div style={{ width: "100%", borderTopLeftRadius: 30, padding: 25, background: theme.card }} onClick={e => e.stopPropagation()}>
                                <h3>ルールの設定</h3>
                                <div style={{ marginBottom: 15 }}>
                                    <label style={{ fontSize: 12, opacity: 0.6 }}>模様の名前 / 内容</label>
                                    <input type="text" value={ruleAction} onChange={e => setRuleAction(e.target.value)} style={{ width: "100%", padding: 15, borderRadius: 12, border: "none", background: theme.inputBg, color: theme.text, fontSize: 16, marginTop: 5 }} />
                                </div>
                                <div style={{ display: "flex", gap: 15, marginBottom: 20 }}>
                                    <div style={{ flex: 1 }}>
                                        <label style={{ fontSize: 12, opacity: 0.6 }}>開始段数</label>
                                        <input type="number" value={ruleStart} onChange={e => setRuleStart(Number(e.target.value))} style={{ width: "100%", padding: 15, borderRadius: 12, border: "none", background: theme.inputBg, color: theme.text, fontSize: 16, marginTop: 5 }} />
                                    </div>
                                    <div style={{ flex: 1 }}>
                                        <label style={{ fontSize: 12, opacity: 0.6 }}>周期 (○段1模様)</label>
                                        <input type="number" value={ruleEvery} onChange={e => setRuleEvery(Number(e.target.value))} style={{ width: "100%", padding: 15, borderRadius: 12, border: "none", background: theme.inputBg, color: theme.text, fontSize: 16, marginTop: 5 }} />
                                    </div>
                                </div>
                                <div style={{ display: "flex", gap: 10 }}>
                                    {editingRuleIndex !== null && <button onClick={() => { updateProject({ ...currentProject, rules: currentProject.rules.filter((_, idx) => idx !== editingRuleIndex) }); setRuleModalOpen(false); }} style={{ flex: 1, padding: 15, background: theme.danger + "22", color: theme.danger, border: "none", borderRadius: 12, fontWeight: "bold" }}>削除</button>}
                                    <button onClick={() => {
                                        const newRule = { start: ruleStart, every: ruleEvery, times: 0, action: ruleAction };
                                        const newRules = [...currentProject.rules];
                                        if (editingRuleIndex !== null) newRules[editingRuleIndex] = newRule;
                                        else newRules.push(newRule);
                                        updateProject({ ...currentProject, rules: newRules });
                                        setRuleModalOpen(false);
                                    }} style={{ flex: 2, padding: 15, background: theme.accent, color: "white", border: "none", borderRadius: 12, fontWeight: "bold" }}>保存</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {activeAlert && (
                        <div style={{ position: "fixed", inset: 0, background: theme.accent, display: "flex", alignItems: "center", justifyContent: "center", zIndex: 2000 }} onClick={() => setActiveAlert(null)}>
                            <div style={{ textAlign: "center", color: "white" }}>
                                <div style={{ fontSize: 60, fontWeight: "900" }}>{activeAlert}</div>
                                <div style={{ marginTop: 30, padding: "10px 40px", border: "2px solid white", borderRadius: 15 }}>OK</div>
                            </div>
                        </div>
                    )}

                    {settingsOpen && (
                        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "flex-end", zIndex: 1000 }} onClick={() => setSettingsOpen(false)}>
                            <div style={{ width: "100%", borderTopLeftRadius: 30, padding: 25, background: theme.card }} onClick={e => e.stopPropagation()}>
                                <h3>作品の管理</h3>
                                <button onClick={() => { setDarkMode(!darkMode); setSettingsOpen(false); }} style={{ width: "100%", padding: 15, borderRadius: 12, border: "none", background: theme.gray, color: theme.text, marginBottom: 10 }}>ダークモード切替</button>
                                <button onClick={() => setSettingsOpen(false)} style={{ width: "100%", padding: 15, borderRadius: 12, border: "none", background: theme.accent, color: "white" }}>閉じる</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
