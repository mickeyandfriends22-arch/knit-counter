<!DOCTYPE html><html lang="ja"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>編み物ログ Stable</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; background-color: #F2F2F7; -webkit-tap-highlight-color: transparent; user-select: none; overflow-x: hidden; }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
        @media (prefers-color-scheme: dark) { body { background-color: #000; } }
        .btn-active:active { transform: scale(0.95); opacity: 0.7; }
        
        /* 数字の上の横並びエリア */
        .status-row { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 15px; 
            min-height: 30px; 
            margin-bottom: 5px;
            width: 100%;
        }
        .status-item { font-weight: 800; font-size: 15px; white-space: nowrap; }
        .next-label { color: #FF3B30; }
        .pattern-label { color: #007AFF; }
        
        .main-card { border-radius: 40px; padding: 30px 20px; text-align: center; background: #FFF; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        @media (prefers-color-scheme: dark) { .main-card { background: #1C1C1E; } }
        
        .counter-num { font-size: 110px; font-weight: 900; lineHeight: 1; margin: 5px 0; }
        .progress-bar { height: 24px; background: #E5E5EA; border-radius: 12px; position: relative; overflow: hidden; margin: 15px 0; }
        @media (prefers-color-scheme: dark) { .progress-bar { background: #2C2C2E; } }
        .progress-fill { height: 100%; background: #007AFF; transition: width 0.3s; }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        function App() {
            // データ消失防止のためキーを固定
            const STORAGE_KEY = "knit-app-v4-stable";
            
            const [projects, setProjects] = useState(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                return saved ? JSON.parse(saved) : [{ id: 1, name: "作品1", count: 0, targetCount: 0, history: [], rules: [] }];
            });
            const [selectedId, setSelectedId] = useState(() => Number(localStorage.getItem(STORAGE_KEY + "_id")) || 1);
            const [ruleModalOpen, setRuleModalOpen] = useState(false);
            const [settingsOpen, setSettingsOpen] = useState(false);
            const [activeAlert, setActiveAlert] = useState(null);
            const [editingRuleIndex, setEditingRuleIndex] = useState(null);
            const [darkMode, setDarkMode] = useState(window.matchMedia('(prefers-color-scheme: dark)').matches);

            const currentProject = useMemo(() => projects.find(p => p.id === selectedId) || projects[0], [projects, selectedId]);

            // 保存処理
            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
                localStorage.setItem(STORAGE_KEY + "_id", selectedId);
            }, [projects, selectedId]);

            // 全てのマイルストーン計算
            const allPoints = useMemo(() => {
                let pts = [];
                currentProject.rules.forEach(r => {
                    const limit = r.times === 0 ? 500 : r.times;
                    for(let i=0; i<limit; i++) {
                        pts.push({ step: r.start + (i * r.every), action: r.action, isPattern: r.isPattern });
                    }
                });
                return pts.sort((a,b) => a.step - b.step);
            }, [currentProject.rules]);

            // 次の通常ルール
            const nextNormal = useMemo(() => allPoints.find(p => p.step > currentProject.count && !p.isPattern), [allPoints, currentProject.count]);

            // 編み込み進捗計算
            const patternStatus = useMemo(() => {
                const rule = currentProject.rules.find(r => r.isPattern && currentProject.count >= r.start && (r.times === 0 || currentProject.count < (r.start + r.every * r.times)));
                if (!rule) return null;
                const pos = (currentProject.count - rule.start) % rule.every;
                const lap = Math.floor((currentProject.count - rule.start) / rule.every) + 1;
                return `${pos + 1}/${rule.every} (${lap}回目)`;
            }, [currentProject.rules, currentProject.count]);

            const handleCount = (delta) => {
                const nextVal = Math.max(0, currentProject.count + delta);
                if (delta > 0) {
                    const hit = allPoints.find(p => p.step === nextVal && !p.isPattern);
                    if (hit) setActiveAlert(hit.action);
                    if ("vibrate" in navigator) navigator.vibrate(15);
                }
                const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const newHist = [{ time, action: delta > 0 ? "+1" : "-1", count: nextVal }, ...(currentProject.history || [])].slice(0, 10);
                setProjects(prev => prev.map(p => p.id === selectedId ? { ...p, count: nextVal, history: newHist } : p));
            };

            const [rStart, setRStart] = useState(0);
            const [rEvery, setREvery] = useState(10);
            const [rTimes, setRTimes] = useState(0);
            const [rAction, setRAction] = useState("");
            const [rIsPat, setRIsPat] = useState(false);

            return (
                <div style={{ minHeight: "100vh", padding: "40px 20px", background: darkMode ? "#000" : "#F2F2F7", color: darkMode ? "#FFF" : "#000" }}>
                    
                    <div style={{display:"flex", gap:10, marginBottom:20}}>
                        <div style={{display:"flex", gap:8, overflowX:"auto", flex:1}}>
                            {projects.map(p => (
                                <button key={p.id} onClick={() => setSelectedId(p.id)} style={{ border:"none", borderRadius:12, padding:"10px 18px", fontWeight:"bold", background: p.id === selectedId ? "#007AFF" : (darkMode ? "#2C2C2E" : "#E5E5EA"), color: p.id === selectedId ? "#FFF" : (darkMode ? "#FFF" : "#000") }}>{p.name}</button>
                            ))}
                        </div>
                        <button onClick={() => setSettingsOpen(true)} style={{border:"none", borderRadius:12, width:40, background: darkMode ? "#2C2C2E" : "#E5E5EA"}}>⚙️</button>
                    </div>

                    <div className="main-card">
                        {/* 数字の上の横並び表示エリア */}
                        <div className="status-row">
                            {nextNormal && <div className="status-item next-label">次は{nextNormal.step}段目</div>}
                            {patternStatus && <div className="status-item pattern-label">{patternStatus}</div>}
                        </div>

                        <div className="counter-num">{currentProject.count}</div>
                        
                        <div style={{ display: "flex", gap: "15px" }}>
                            <button className="btn-active" onClick={() => handleCount(-1)} style={{ width: "80px", height: "80px", borderRadius: "25px", border: "none", fontSize: "30px", background: darkMode ? "#2C2C2E" : "#E5E5EA", color: darkMode ? "#FFF" : "#000" }}>−</button>
                            <button className="btn-active" onClick={() => handleCount(1)} style={{ flex: 1, height: "80px", borderRadius: "25px", border: "none", fontSize: "40px", background: "#007AFF", color: "white", fontWeight: "bold" }}>＋</button>
                        </div>
                    </div>

                    <div style={{display:"flex", justifyContent:"space-between", marginTop:30, marginBottom:10, alignItems:"center"}}>
                        <span style={{fontWeight:"bold", opacity:0.5}}>ルール</span>
                        <button onClick={() => { setEditingRuleIndex(null); setRStart(currentProject.count); setREvery(10); setRTimes(0); setRAction("模様"); setRIsPat(true); setRuleModalOpen(true); }} style={{background:"none", border:"none", color:"#007AFF", fontWeight:"bold"}}>+ 追加</button>
                    </div>

                    {currentProject.rules.map((r, i) => (
                        <div key={i} onClick={() => { setEditingRuleIndex(i); setRStart(r.start); setREvery(r.every); setRTimes(r.times); setRAction(r.action); setRIsPat(r.isPattern); setRuleModalOpen(true); }} style={{ padding: 15, background: darkMode ? "#1C1C1E" : "#FFF", borderRadius: 15, marginBottom: 10, display: "flex", justifyContent: "space-between", borderLeft: `5px solid ${r.isPattern ? "#007AFF" : "#FF3B30"}` }}>
                            <div style={{fontWeight:"bold"}}>{r.action} <span style={{fontSize:11, opacity:0.5}}>{r.start}段〜 {r.every}毎</span></div>
                            <span style={{opacity:0.3}}>Edit</span>
                        </div>
                    ))}

                    {ruleModalOpen && (
                        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", display: "flex", alignItems: "flex-end", zIndex: 1000 }} onClick={() => setRuleModalOpen(false)}>
                            <div style={{ width: "100%", borderRadius: "30px 30px 0 0", padding: 25, background: darkMode ? "#1C1C1E" : "#FFF" }} onClick={e => e.stopPropagation()}>
                                <label style={{display:"flex", alignItems:"center", gap:10, marginBottom:15}}><input type="checkbox" checked={rIsPat} onChange={e=>setRIsPat(e.target.checked)} /> 編み込みモード</label>
                                <div style={{display:"flex", gap:10, marginBottom:10}}>
                                    <div style={{flex:1}}>開始<input type="number" value={rStart} onChange={e=>setRStart(Number(e.target.value))} style={{width:"100%", padding:10}}/></div>
                                    <div style={{flex:1}}>間隔<input type="number" value={rEvery} onChange={e=>setREvery(Number(e.target.value))} style={{width:"100%", padding:10}}/></div>
                                </div>
                                内容<input type="text" value={rAction} onChange={e=>setRAction(e.target.value)} style={{width:"100%", padding:10, marginBottom:20}}/>
                                <div style={{display:"flex", gap:10}}>
                                    {editingRuleIndex !== null && <button onClick={() => { setProjects(prev => prev.map(p => p.id === selectedId ? {...p, rules: p.rules.filter((_, idx) => idx !== editingRuleIndex)} : p)); setRuleModalOpen(false); }} style={{flex:1, padding:12, background:"#FF3B3022", color:"#FF3B30", border:"none", borderRadius:10}}>削除</button>}
                                    <button onClick={() => {
                                        const newR = {start: rStart, every: rEvery, times: rTimes, action: rAction, isPattern: rIsPat};
                                        setProjects(prev => prev.map(p => {
                                            if(p.id !== selectedId) return p;
                                            let rs = [...p.rules];
                                            if(editingRuleIndex !== null) rs[editingRuleIndex] = newR; else rs.push(newR);
                                            return {...p, rules: rs};
                                        }));
                                        setRuleModalOpen(false);
                                    }} style={{flex:2, padding:12, background:"#007AFF", color:"white", border:"none", borderRadius:10}}>保存</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {settingsOpen && (
                        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", display: "flex", alignItems: "center", padding: 20, zIndex: 1000 }} onClick={() => setSettingsOpen(false)}>
                            <div style={{ width: "100%", borderRadius: 25, padding: 25, background: darkMode ? "#1C1C1E" : "#FFF" }} onClick={e => e.stopPropagation()}>
                                作品名<input type="text" value={currentProject.name} onChange={e => {
                                    const val = e.target.value;
                                    setProjects(prev => prev.map(p => p.id === selectedId ? {...p, name: val} : p));
                                }} style={{width:"100%", padding:10, marginBottom:15}} />
                                目標段数<input type="number" value={currentProject.targetCount} onChange={e => {
                                    const val = Number(e.target.value);
                                    setProjects(prev => prev.map(p => p.id === selectedId ? {...p, targetCount: val} : p));
                                }} style={{width:"100%", padding:10, marginBottom:20}} />
                                <button onClick={() => {
                                    const n = { id: Date.now(), name: "新規作品", count: 0, targetCount: 0, history: [], rules: [] };
                                    setProjects([...projects, n]); setSelectedId(n.id); setSettingsOpen(false);
                                }} style={{width:"100%", padding:12, background:"#007AFF", color:"#FFF", border:"none", borderRadius:10, marginBottom:10}}>作品を追加</button>
                                <button onClick={() => setSettingsOpen(false)} style={{width:"100%", padding:12, background:darkMode?"#FFF":"#000", color:darkMode?"#000":"#FFF", border:"none", borderRadius:10}}>閉じる</button>
                            </div>
                        </div>
                    )}

                    {activeAlert && (
                        <div style={{ position: "fixed", inset: 0, background: "#FF3B30", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 2000 }} onClick={() => setActiveAlert(null)}>
                            <div style={{ textAlign: "center", color: "white" }}>
                                <div style={{ fontSize: 60, fontWeight: "900" }}>{activeAlert}</div>
                                <div style={{ marginTop: 40, padding: "10px 30px", border: "2px solid white", borderRadius: 10 }}>OK</div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script></body></html>
